<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Tracked Inventory</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="sm:flex sm:items-center justify-between mb-6">
            <div class="sm:flex-auto">
                <h1 class="text-xl font-semibold text-gray-900">Tracked Inventory</h1>
                <p class="mt-2 text-sm text-gray-700">Items you are keeping for your collection or grading.</p>
            </div>
        </div>

        <!-- Filters -->
        <div class="border-b border-gray-200 mb-6 overflow-x-auto">
            <nav class="-mb-px flex space-x-8" aria-label="Tabs">
                <a href="/collection"
                   class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors"
                   th:classappend="${currentPurpose == null} ? 'border-cwz-gold text-cwz-gold' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
                    All Items
                </a>
                <a href="/collection?purpose=PERSONAL_COLLECTION"
                   class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors"
                   th:classappend="${currentPurpose?.name() == 'PERSONAL_COLLECTION'} ? 'border-cwz-gold text-cwz-gold' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
                    Collection
                </a>
                <a href="/collection?purpose=TO_GRADE"
                   class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors"
                   th:classappend="${currentPurpose?.name() == 'TO_GRADE'} ? 'border-cwz-pink text-cwz-pink' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
                    To Grade
                </a>
                <a href="/collection?purpose=IN_GRADING"
                   class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors"
                   th:classappend="${currentPurpose?.name() == 'IN_GRADING'} ? 'border-cwz-pink text-cwz-pink' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
                    In Grading
                </a>
                <a href="/collection?purpose=GRADED_INVENTORY"
                   class="whitespace-nowrap py-4 px-1 border-b-2 font-medium text-sm transition-colors"
                   th:classappend="${currentPurpose?.name() == 'GRADED_INVENTORY'} ? 'border-cwz-blue text-cwz-blue' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'">
                    Graded Inventory
                </a>
            </nav>
        </div>

        <div class="flex flex-col">
            <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="inline-block min-w-full py-2 align-middle md:px-6 lg:px-8">
                    <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                        <table class="min-w-full divide-y divide-gray-300">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-6 w-1/3">Item</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Status</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Details</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Cost</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Market</th>
                                    <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6">
                                        <span class="sr-only">Actions</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 bg-white">
                                <tr th:each="item : ${items}" th:replace="~{fragments/tracked-item-row :: trackedItemRow(${item})}"></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
