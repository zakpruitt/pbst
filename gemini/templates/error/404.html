<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Not Found</title>
</head>
<body>
<div layout:fragment="content">
    <div class="text-center">
        <h1 class="text-4xl font-bold text-purple-600">404 - Not Found</h1>
        <p class="mt-4 text-lg text-gray-600">The page you are looking for does not exist.</p>
        <p class="mt-2 text-sm text-gray-500" th:text="${errorMessage}"></p>
        <a href="/" class="mt-6 inline-block bg-purple-600 text-white font-bold py-2 px-4 rounded hover:bg-purple-700">Go Home</a>
    </div>
</div>
</body>
</html>
