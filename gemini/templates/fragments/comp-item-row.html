<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<!-- Main Row -->
<div th:fragment="compItemRow(itemIndex, card)" class="comp-item-wrapper">
    <div class="comp-item-row group flex items-center gap-3 p-3 bg-white border-b border-gray-100 hover:bg-gray-50 transition-colors text-sm">

        <input type="hidden" th:name="'trackedItems[' + ${itemIndex} + '].pokemonCardId'" th:value="${card?.id}">
        <input type="hidden" class="snapshot-name" th:value="${card?.name}">
        <input type="hidden" class="snapshot-set" th:value="${card?.setName}">

        <!-- 1. Image (Larger) -->
        <div class="flex-shrink-0 w-12 h-16 bg-gray-100 rounded overflow-hidden border border-gray-200 relative">
            <img th:if="${card?.imageUrl}" th:src="${card.imageUrl}" class="w-full h-full object-cover">
            <div th:unless="${card?.imageUrl}" class="w-full h-full flex items-center justify-center text-gray-300 text-[10px]">IMG</div>
        </div>

        <!-- 2. Item Name (Flexible width) -->
        <div class="flex-1 min-w-0">
            <input type="text" th:name="'trackedItems[' + ${itemIndex} + '].name'" th:value="${card?.name}"
                   th:readonly="${card?.id != null}"
                   th:classappend="${card?.id != null} ? 'bg-transparent cursor-default' : ''"
                   class="block w-full border-0 p-0 text-sm font-medium text-gray-900 focus:ring-0 placeholder-gray-400 truncate"
                   placeholder="Item Name">
            <div class="flex items-center gap-1 text-[10px] text-gray-400 mt-1">
                <span th:if="${card?.setName}" th:text="${card.setName}" class="truncate"></span>
                <span th:if="${card?.setCode}" class="bg-gray-100 px-1.5 py-0.5 rounded text-gray-600 font-mono flex-shrink-0" th:text="${card.setCode}"></span>
            </div>
        </div>

        <!-- 3. Qty -->
        <div class="w-14">
            <input type="number" min="1" step="1" th:name="'trackedItems[' + ${itemIndex} + '].quantity'" value="1"
                   class="quantity block w-full border-gray-200 rounded text-center text-sm py-1.5 px-0 focus:ring-cwz-green focus:border-cwz-green"
                   oninput="updateOfferPrice()">
        </div>

        <!-- 4. Market Value -->
        <div class="w-24 relative">
            <span class="absolute left-2 top-1.5 text-gray-400 text-sm">$</span>
            <input type="number" step="0.01" th:name="'trackedItems[' + ${itemIndex} + '].marketValueAtPurchase'" th:value="${card?.marketPrice}"
                   class="market-value block w-full border-gray-200 rounded text-right text-sm py-1.5 pl-5 pr-2 focus:ring-cwz-green focus:border-cwz-green"
                   placeholder="0.00" oninput="updateOfferPrice()">
        </div>

        <!-- 5. % -->
        <div class="w-16 relative">
            <input type="number" step="1" th:name="'trackedItems[' + ${itemIndex} + '].percentage'" value="60"
                   class="percentage block w-full border-gray-200 rounded text-right text-sm py-1.5 pr-5 pl-0 focus:ring-cwz-green focus:border-cwz-green"
                   oninput="updateOfferPrice()">
            <span class="absolute right-2 top-1.5 text-gray-400 text-xs">%</span>
        </div>

        <!-- Hidden Cost Basis (Calculated) -->
        <input type="hidden" th:name="'trackedItems[' + ${itemIndex} + '].costBasis'" class="cost-basis">

        <!-- 6. Total (Display) -->
        <div class="w-20 text-right font-semibold text-gray-900 row-total text-sm">$0.00</div>

        <!-- 7. Actions (Compact Toggles) -->
        <div class="flex items-center gap-2 ml-2 border-l border-gray-100 pl-2">
            <!-- Type Select (Replaces Slab Toggle) -->
            <div class="w-20">
                <select th:name="'trackedItems[' + ${itemIndex} + '].itemType'"
                        class="item-type-select block w-full border-gray-200 rounded text-xs py-1 pl-1 pr-6 focus:ring-cwz-blue focus:border-cwz-blue"
                        onchange="handleTypeChange(this)">
                    <option value="RAW_CARD">Raw</option>
                    <option value="GRADED_CARD">Slab</option>
                    <option value="SEALED_PRODUCT">Sealed</option>
                </select>
            </div>

            <!-- Track Toggle -->
            <label class="cursor-pointer text-gray-300 hover:text-cwz-pink transition-colors" title="Keep/Track?">
                <input type="checkbox" th:name="'trackedItems[' + ${itemIndex} + '].isTracked'" value="true" class="sr-only peer track-checkbox" onchange="updateRowStyle(this); toggleTrackedFields(this)">
                <svg class="w-6 h-6 peer-checked:text-cwz-pink" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                </svg>
            </label>

            <!-- Remove -->
            <button type="button" class="text-gray-300 hover:text-red-500 transition-colors" onclick="this.closest('.comp-item-wrapper').remove(); updateOfferPrice();">
                <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </div>
    </div>

    <!-- Details Row (Hidden by default) -->
    <div class="details-row hidden bg-gray-50 border-b border-gray-200 p-3 text-sm grid grid-cols-2 gap-4">
        <div class="slab-details hidden space-y-2">
            <p class="font-semibold text-cwz-blue uppercase text-xs tracking-wide">Slab Details</p>
            <div class="flex gap-2 items-center">
                <select th:name="'trackedItems[' + ${itemIndex} + '].gradingCompany'"
                        class="grading-company-select border-gray-300 rounded text-sm py-1.5 focus:ring-cwz-blue focus:border-cwz-blue"
                        onchange="updateGradeOptions(this)">
                    <option value="">Co.</option>
                    <option value="PSA">PSA</option>
                    <option value="BGS">BGS</option>
                    <option value="TAG">TAG</option>
                    <option value="CGC">CGC</option>
                </select>

                <!-- Dynamic Grade Input Container -->
                <div class="grade-input-container w-24">
                    <input type="text" th:name="'trackedItems[' + ${itemIndex} + '].grade'" placeholder="Grade" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-blue focus:border-cwz-blue">
                </div>
            </div>
        </div>
        <div class="track-details hidden space-y-2">
            <p class="font-semibold text-cwz-pink uppercase text-xs tracking-wide">Tracking</p>
            <div class="flex gap-2">
                <select th:name="'trackedItems[' + ${itemIndex} + '].purpose'" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-pink focus:border-cwz-pink">
                    <option value="PERSONAL_COLLECTION">Personal Collection</option>
                    <option value="TO_GRADE">To Grade</option>
                </select>
            </div>
        </div>
    </div>
</div>

<script>
    function checkDetailsVisibility(wrapper) {
        const detailsRow = wrapper.querySelector('.details-row');
        const slabVisible = !wrapper.querySelector('.slab-details').classList.contains('hidden');
        const trackVisible = !wrapper.querySelector('.track-details').classList.contains('hidden');

        if (slabVisible || trackVisible) {
            detailsRow.classList.remove('hidden');
        } else {
            detailsRow.classList.add('hidden');
        }
    }

    function handleTypeChange(select) {
        const wrapper = select.closest('.comp-item-wrapper');
        const row = wrapper.querySelector('.comp-item-row');
        const slabFields = wrapper.querySelector('.slab-details');

        if (select.value === 'GRADED_CARD') {
            slabFields.classList.remove('hidden');
            row.classList.add('bg-blue-50');
        } else {
            slabFields.classList.add('hidden');
            row.classList.remove('bg-blue-50');
        }

        // Re-apply track highlight if needed
        const isTracked = wrapper.querySelector('.track-checkbox').checked;
        if (isTracked) {
            row.classList.add('bg-pink-50');
            if (select.value === 'GRADED_CARD') {
                row.classList.add('bg-purple-50'); // Mixed
            }
        }

        checkDetailsVisibility(wrapper);
    }

    function updateRowStyle(checkbox) {
        const wrapper = checkbox.closest('.comp-item-wrapper');
        const row = wrapper.querySelector('.comp-item-row');
        const typeSelect = wrapper.querySelector('.item-type-select');
        const isSlab = typeSelect.value === 'GRADED_CARD';
        const isTracked = checkbox.checked;

        // Reset classes
        row.classList.remove('bg-white', 'bg-blue-50', 'bg-pink-50', 'bg-purple-50');

        if (isSlab && isTracked) {
            row.classList.add('bg-purple-50'); // Mixed
        } else if (isSlab) {
            row.classList.add('bg-blue-50');
        } else if (isTracked) {
            row.classList.add('bg-pink-50');
        } else {
            row.classList.add('bg-white');
        }
    }

    function toggleTrackedFields(checkbox) {
        const wrapper = checkbox.closest('.comp-item-wrapper');
        const fields = wrapper.querySelector('.track-details');

        if (checkbox.checked) {
            fields.classList.remove('hidden');
        } else {
            fields.classList.add('hidden');
        }
        checkDetailsVisibility(wrapper);
    }

    function updateGradeOptions(select) {
        const company = select.value;
        const container = select.nextElementSibling;
        const name = select.name.replace('gradingCompany', 'grade');

        let html = '';

        if (company === 'PSA') {
            html = `<select name="${name}" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-blue focus:border-cwz-blue">
                        <option value="10">10</option>
                        <option value="9">9</option>
                        <option value="8">8</option>
                        <option value="7">7</option>
                        <option value="6">6</option>
                        <option value="5">5</option>
                        <option value="4">4</option>
                        <option value="3">3</option>
                        <option value="2">2</option>
                        <option value="1">1</option>
                    </select>`;
        } else if (company === 'BGS' || company === 'CGC') {
            html = `<select name="${name}" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-blue focus:border-cwz-blue">
                        <option value="10">10 Pristine</option>
                        <option value="10 BL">10 Black Label</option>
                        <option value="9.5">9.5</option>
                        <option value="9">9</option>
                        <option value="8.5">8.5</option>
                        <option value="8">8</option>
                        <option value="7.5">7.5</option>
                        <option value="7">7</option>
                        <!-- Add lower grades as needed -->
                    </select>`;
        } else if (company === 'TAG') {
            html = `<select name="${name}" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-blue focus:border-cwz-blue">
                        <option value="10">10</option>
                        <option value="10 P">10 Pristine</option>
                        <option value="9">9</option>
                        <option value="8">8</option>
                        <!-- Add lower grades -->
                    </select>`;
        } else {
            html = `<input type="text" name="${name}" placeholder="Grade" class="border-gray-300 rounded text-sm py-1.5 w-full focus:ring-cwz-blue focus:border-cwz-blue">`;
        }

        container.innerHTML = html;
    }
</script>
</body>
</html>
