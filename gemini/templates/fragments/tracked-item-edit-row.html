<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="trackedItemEditRow(item)" th:if="${item != null}" class="bg-yellow-50">
    <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm sm:pl-6" colspan="6">
        <form th:action="@{/api/tracked-items/{id}(id=${item.id})}" method="post"
              hx-put="@{/api/tracked-items/{id}(id=${item.id})}"
              hx-target="closest tr"
              hx-swap="outerHTML">

            <div class="grid grid-cols-12 gap-4 items-center">
                <!-- Name (Read-only mostly, but editable if manual) -->
                <div class="col-span-4">
                    <label class="block text-xs font-medium text-gray-500">Name</label>
                    <input type="text" name="name" th:value="${item.name}"
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-cwz-blue focus:border-cwz-blue sm:text-sm">
                </div>

                <!-- Purpose -->
                <div class="col-span-3">
                    <label class="block text-xs font-medium text-gray-500">Purpose</label>
                    <select name="purpose" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-cwz-blue focus:border-cwz-blue sm:text-sm rounded-md"
                            th:disabled="${item?.gradingStatus?.name() == 'IN_GRADING'}">
                        <option value="PERSONAL_COLLECTION" th:selected="${item?.purpose?.name() == 'PERSONAL_COLLECTION'}">Collection</option>
                        <option value="TO_GRADE" th:selected="${item?.purpose?.name() == 'TO_GRADE'}">To Grade</option>
                        <option value="GRADED_INVENTORY" th:selected="${item?.purpose?.name() == 'GRADED_INVENTORY'}">Inventory</option>
                    </select>
                    <p th:if="${item?.gradingStatus?.name() == 'IN_GRADING'}" class="text-xs text-red-500 mt-1">Cannot change while in grading.</p>
                </div>

                <!-- Cost Basis -->
                <div class="col-span-2">
                    <label class="block text-xs font-medium text-gray-500">Cost</label>
                    <input type="number" step="0.01" name="costBasis" th:value="${item.costBasis}"
                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-cwz-blue focus:border-cwz-blue sm:text-sm">
                </div>

                <!-- Actions -->
                <div class="col-span-3 flex items-end justify-end gap-2">
                    <button type="button" class="bg-white py-2 px-3 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 transition-colors"
                            th:attr="hx-get=@{/api/tracked-items/{id}/row(id=${item.id})}" hx-target="closest tr" hx-swap="outerHTML">
                        Cancel
                    </button>
                    <button type="submit" class="inline-flex justify-center py-2 px-3 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-cwz-green hover:bg-green-700 transition-colors">
                        Save
                    </button>
                </div>
            </div>
        </form>
    </td>
</tr>
</body>
</html>
