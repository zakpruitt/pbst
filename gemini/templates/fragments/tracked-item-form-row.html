<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="trackedItemFormRow(itemIndex, card)" class="tracked-item-row p-4 border border-gray-300 rounded-md bg-white relative">
    <button type="button" class="absolute top-2 right-2 text-gray-400 hover:text-gray-600"
            onclick="this.closest('.tracked-item-row').remove()">
        <span class="sr-only">Remove item</span>
        <svg class="h-5 w-5" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
            <path fill-rule="evenodd" d="M4.293 4.293a1 1 0 011.414 0L10 8.586l4.293-4.293a1 1 0 111.414 1.414L11.414 10l4.293 4.293a1 1 0 01-1.414 1.414L10 11.414l-4.293 4.293a1 1 0 01-1.414-1.414L8.586 10 4.293 5.707a1 1 0 010-1.414z" clip-rule="evenodd" />
        </svg>
    </button>

    <div class="grid grid-cols-6 gap-6">
        <input type="hidden" th:name="'trackedItems[' + ${itemIndex} + '].pokemonCardId'" th:value="${card?.id}" />

        <div class="col-span-6 sm:col-span-3">
            <label class="block text-sm font-medium text-gray-700">Item Name</label>
            <input type="text" th:name="'trackedItems[' + ${itemIndex} + '].manualNameOverride'" th:value="${card?.name}" required class="mt-1 focus:ring-purple-500 focus:border-purple-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
        </div>

        <div class="col-span-6 sm:col-span-3">
            <label class="block text-sm font-medium text-gray-700">Purpose</label>
            <select th:name="'trackedItems[' + ${itemIndex} + '].purpose'" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm rounded-md">
                <option value="PERSONAL_COLLECTION">Personal Collection</option>
                <option value="TO_GRADE">To Grade</option>
            </select>
        </div>

        <div class="col-span-6 sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Item Type</label>
            <select th:name="'trackedItems[' + ${itemIndex} + '].itemType'" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-purple-500 focus:border-purple-500 sm:text-sm rounded-md">
                <option value="RAW_CARD">Raw Card</option>
                <option value="GRADED_CARD">Graded Card</option>
                <option value="SEALED_PRODUCT">Sealed Product</option>
            </select>
        </div>

        <div class="col-span-6 sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Cost Basis (%)</label>
            <input type="number" step="0.01" th:name="'trackedItems[' + ${itemIndex} + '].costBasis'" value="60" class="mt-1 focus:ring-purple-500 focus:border-purple-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
        </div>

        <div class="col-span-6 sm:col-span-2">
            <label class="block text-sm font-medium text-gray-700">Market Value</label>
            <input type="number" step="0.01" th:name="'trackedItems[' + ${itemIndex} + '].marketValue'" class="mt-1 focus:ring-purple-500 focus:border-purple-500 block w-full shadow-sm sm:text-sm border-gray-300 rounded-md">
        </div>
    </div>
</div>
</body>
</html>
