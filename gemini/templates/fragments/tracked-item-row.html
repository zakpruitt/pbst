<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<tr th:fragment="trackedItemRow(item)" th:if="${item != null}" class="hover:bg-gray-50 transition-colors">
    <!-- Item Column -->
    <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm sm:pl-6">
        <div class="flex items-center">
            <!-- Icon Logic -->
            <div class="h-12 w-10 flex-shrink-0 rounded overflow-hidden border mr-3 relative flex items-center justify-center"
                 th:classappend="${item?.itemType != null and item?.itemType?.name() == 'GRADED_CARD'} ? 'bg-cwz-blue/10 border-cwz-blue/30' : 'bg-gray-100 border-gray-200'">

                <img th:if="${item?.imageUrl}" th:src="${item.imageUrl}" class="w-full h-full object-cover">

                <!-- Fallback Icons -->
                <div th:unless="${item?.imageUrl}" class="text-center">
                    <svg th:if="${item?.itemType != null and item?.itemType?.name() == 'GRADED_CARD'}" class="h-6 w-6 text-cwz-blue mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
                    </svg>
                    <svg th:if="${item?.itemType == null or item?.itemType?.name() == 'RAW_CARD'}" class="h-6 w-6 text-gray-400 mx-auto" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                    </svg>
                    <span th:if="${item?.imageUrl == null}" class="text-[8px] text-gray-400 block">IMG</span>
                </div>
            </div>
            <div>
                <div class="font-medium text-gray-900 truncate max-w-[200px]" th:text="${item?.name ?: 'Unknown Item'}" th:title="${item?.name}"></div>
                <div class="text-xs text-gray-500 truncate max-w-[200px]" th:text="${item?.setName}"></div>
            </div>
        </div>
    </td>

    <!-- Status Column -->
    <td class="whitespace-nowrap px-3 py-4 text-sm">
        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
              th:classappend="${item?.itemType != null and item?.itemType?.name() == 'GRADED_CARD'} ? 'bg-cwz-blue/10 text-cwz-blue' : (${item?.gradingStatus != null and item?.gradingStatus?.name() == 'IN_GRADING'} ? 'bg-yellow-100 text-yellow-800' : 'bg-gray-100 text-gray-800')"
              th:text="${item?.itemType != null and item?.itemType?.name() == 'GRADED_CARD' ? 'Graded' : (item?.gradingStatus != null ? #strings.replace(item.gradingStatus, '_', ' ') : 'Raw')}">
        </span>
    </td>

    <!-- Details Column (Sub Link or Grade) -->
    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">
        <!-- In Grading: Show Sub Link -->
        <div th:if="${item?.gradingSubmissionId != null and (item?.itemType == null or item?.itemType?.name() != 'GRADED_CARD')}">
            <a th:href="@{/grading/{id}(id=${item.gradingSubmissionId})}" class="text-cwz-blue hover:text-blue-800 font-medium flex items-center gap-1 transition-colors">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
                </svg>
                <span th:text="${'Sub #' + item.gradingSubmissionId}"></span>
            </a>
        </div>

        <!-- Graded: Show Grade -->
        <div th:if="${item?.itemType != null and item?.itemType?.name() == 'GRADED_CARD' and item?.gradingCompany != null}">
            <span class="inline-flex items-center px-2 py-0.5 rounded text-xs font-bold bg-white border border-gray-300 shadow-sm">
                <span class="text-gray-500 mr-1" th:text="${item.gradingCompany}"></span>
                <span class="text-gray-900" th:text="${item.grade}"></span>
            </span>
        </div>

        <!-- Raw: Empty or Condition -->
        <div th:if="${(item?.itemType == null or item?.itemType?.name() == 'RAW_CARD') and item?.gradingSubmissionId == null}">
            <span class="text-gray-400 text-xs">-</span>
        </div>
    </td>

    <!-- Financials -->
    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right" th:text="${item?.costBasis != null ? '$' + #numbers.formatDecimal(item.costBasis, 1, 2) : '-'}"></td>
    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right" th:text="${item?.marketPrice != null ? '$' + #numbers.formatDecimal(item.marketPrice, 1, 2) : '-'}"></td>

    <!-- Actions -->
    <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
        <div class="flex justify-end gap-2 items-center">
            <!-- Edit Button -->
            <button type="button" class="text-gray-400 hover:text-cwz-blue transition-colors" title="Edit"
                    th:attr="hx-get=@{/api/tracked-items/{id}/edit(id=${item?.id})}"
                    hx-target="closest tr"
                    hx-swap="outerHTML">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z" />
                </svg>
            </button>

            <!-- Delete Button -->
            <button type="button" class="text-gray-400 hover:text-red-600 transition-colors" title="Delete"
                    th:attr="hx-delete=@{/api/tracked-items/{id}(id=${item?.id})}"
                    hx-confirm="Are you sure you want to delete this item?"
                    hx-target="closest tr"
                    hx-swap="outerHTML swap:500ms">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                </svg>
            </button>
        </div>
    </td>
</tr>
</body>
</html>
