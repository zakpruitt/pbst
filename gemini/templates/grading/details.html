<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${submission.submissionName}">Submission Details</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-between items-start border-b border-gray-200 pb-6 mb-6">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${submission.submissionName}"></h1>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          th:classappend="${submission.status.name() == 'RETURNED'} ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'"
                          th:text="${submission.status}">
                    </span>
                </div>
                <p class="mt-1 text-sm text-gray-500" th:text="${submission.company + ' • ' + submission.submissionMethod}"></p>
            </div>
            <div class="flex gap-3">
                <!-- Status Workflow Buttons -->
                <button th:if="${submission.status.name() == 'PREPARING'}"
                        type="button"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-cwz-blue hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-blue transition-all"
                        th:attr="hx-patch=@{/api/grading-submissions/{id}/status(id=${submission.id}, status='SHIPPED')}"
                        hx-target="body"
                        hx-swap="outerHTML">
                    Mark Shipped
                </button>

                <button th:if="${submission.status.name() == 'SHIPPED'}"
                        type="button"
                        class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-cwz-blue hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-blue transition-all"
                        th:attr="hx-patch=@{/api/grading-submissions/{id}/status(id=${submission.id}, status='GRADING')}"
                        hx-target="body"
                        hx-swap="outerHTML">
                    Mark In Grading
                </button>

                <a th:if="${submission.status.name() == 'GRADING'}"
                   th:href="@{/grading/{id}/results(id=${submission.id})}"
                   class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-cwz-green hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-green transition-all">
                    Enter Grades
                </a>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-5 sm:grid-cols-3 mb-8">
            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Total Cost</dt>
                <dd class="mt-1 text-3xl font-semibold text-gray-900" th:text="${'$' + #numbers.formatDecimal(submission.totalGradingCost, 1, 2)}"></dd>
            </div>
            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Items</dt>
                <dd class="mt-1 text-3xl font-semibold text-cwz-pink" th:text="${submission.items.size()}"></dd>
            </div>
            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Sent Date</dt>
                <dd class="mt-1 text-xl font-semibold text-gray-900" th:text="${#temporals.format(submission.sendDate, 'MMM d, yyyy')}"></dd>
            </div>
        </div>

        <div class="space-y-8">
            <div>
                <h2 class="text-lg font-medium text-gray-900 mb-4">Items in Submission</h2>
                <div class="bg-white shadow overflow-hidden sm:rounded-md border border-gray-200">
                    <ul role="list" class="divide-y divide-gray-200">
                        <li th:each="item : ${submission.items}">
                            <div class="px-4 py-4 sm:px-6 hover:bg-gray-50 transition-colors">
                                <div class="flex items-center justify-between">
                                    <div class="flex items-center">
                                        <div class="h-10 w-8 flex-shrink-0 bg-gray-100 rounded overflow-hidden border border-gray-200 mr-3 relative">
                                            <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" class="w-full h-full object-cover">
                                            <div th:unless="${item.imageUrl}" class="w-full h-full flex items-center justify-center text-gray-300 text-[8px]">IMG</div>
                                        </div>
                                        <div>
                                            <p class="text-sm font-medium text-purple-600 truncate" th:text="${item.manualNameOverride ?: 'Unknown Item'}"></p>
                                            <p class="text-xs text-gray-500" th:text="${item.setName}"></p>
                                        </div>
                                    </div>
                                    <div class="flex items-center gap-4">
                                        <span th:if="${item.grade}" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-indigo-100 text-indigo-800" th:text="${'Grade: ' + item.grade}"></span>
                                        <span class="text-sm text-gray-500" th:text="${item.costBasis != null ? 'Cost: $' + #numbers.formatDecimal(item.costBasis, 1, 2) : ''}"></span>
                                    </div>
                                </div>
                            </div>
                        </li>
                    </ul>
                </div>
            </div>

            <div th:if="${submission.notes}" class="bg-gray-50 p-4 rounded-md border border-gray-200">
                <h3 class="text-sm font-medium text-gray-900">Notes</h3>
                <p class="mt-1 text-sm text-gray-500" th:text="${submission.notes}"></p>
            </div>
        </div>
    </div>
</body>
</html>
