<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Grading</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="sm:flex sm:items-center justify-between mb-6">
            <div class="sm:flex-auto">
                <h1 class="text-xl font-semibold text-gray-900">Grading Submissions</h1>
                <p class="mt-2 text-sm text-gray-700">Manage your grading pipeline.</p>
            </div>
            <div class="mt-4 sm:mt-0 sm:ml-16 sm:flex-none">
                <a href="/grading/new" class="inline-flex items-center justify-center rounded-md border border-transparent bg-cwz-pink px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-cwz-pink focus:ring-offset-2 sm:w-auto transition-all">
                    New Submission
                </a>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 gap-5 sm:grid-cols-3 mb-8">
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-200">
                <div class="px-4 py-5 sm:p-6">
                    <dt class="text-sm font-medium text-gray-500 truncate">Active Submissions</dt>
                    <dd class="mt-1 text-3xl font-semibold text-gray-900" th:text="${activeCount}">0</dd>
                </div>
            </div>
            <div class="bg-white overflow-hidden shadow rounded-lg border border-gray-200">
                <div class="px-4 py-5 sm:p-6">
                    <dt class="text-sm font-medium text-gray-500 truncate">Total Grading Cost</dt>
                    <dd class="mt-1 text-3xl font-semibold text-gray-900" th:text="${totalSpent != null ? '$' + #numbers.formatDecimal(totalSpent, 1, 2) : '$0.00'}">$0.00</dd>
                </div>
            </div>
        </div>

        <div class="mt-8 flex flex-col">
            <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="inline-block min-w-full py-2 align-middle md:px-6 lg:px-8">
                    <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                        <table class="min-w-full divide-y divide-gray-300">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-6">Name</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Company</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Status</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Total Cost</th>
                                    <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6">
                                        <span class="sr-only">Actions</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 bg-white" id="grading-submissions-body">
                                <tr th:each="submission : ${submissions}" class="hover:bg-gray-50 transition-colors">
                                    <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm font-medium text-gray-900 sm:pl-6">
                                        <a th:href="@{/grading/{id}(id=${submission.id})}" class="text-cwz-pink hover:text-pink-900" th:text="${submission.submissionName}"></a>
                                    </td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500" th:text="${submission.company}"></td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500">
                                        <span class="px-2 inline-flex text-xs leading-5 font-semibold rounded-full"
                                              th:classappend="${submission.status.toString() == 'RETURNED'} ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'"
                                              th:text="${submission.status}">
                                        </span>
                                    </td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right" th:text="${'$' + #numbers.formatDecimal(submission.totalGradingCost, 1, 2)}"></td>
                                    <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
                                        <button
                                                type="button"
                                                class="text-gray-400 hover:text-red-600 transition-colors"
                                                th:attr="hx-delete=@{/api/grading-submissions/{id}(id=${submission.id})}"
                                                hx-confirm="Are you sure you want to delete this submission?"
                                                hx-target="closest tr"
                                                hx-swap="outerHTML swap:500ms"
                                        >
                                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
