<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Enter Grades</title>
</head>
<body>
    <div layout:fragment="content">
        <form action="/api/grading-submissions/finalize" method="post">
            <input type="hidden" name="id" th:value="${submission.id}">

            <div class="flex justify-between items-center border-b border-gray-200 pb-6 mb-6">
                <div>
                    <h1 class="text-2xl font-bold text-gray-900">Enter Grades</h1>
                    <p class="mt-1 text-sm text-gray-500" th:text="${'For ' + submission.submissionName}"></p>
                </div>
                <button type="submit" class="inline-flex items-center px-4 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-cwz-green hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-green transition-all">
                    Save & Finalize
                </button>
            </div>

            <div class="bg-white shadow overflow-hidden sm:rounded-md border border-gray-200">
                <ul role="list" class="divide-y divide-gray-200">
                    <li th:each="item, iterStat : ${submission.items}">
                        <div class="px-4 py-4 sm:px-6 hover:bg-gray-50 transition-colors">
                            <div class="flex items-center gap-4">
                                <input type="hidden" th:name="'items[' + ${iterStat.index} + '].id'" th:value="${item.id}">

                                <!-- Item Info -->
                                <div class="flex-shrink-0 h-16 w-12 bg-gray-100 rounded overflow-hidden border border-gray-200 relative">
                                    <img th:if="${item.imageUrl}" th:src="${item.imageUrl}" class="w-full h-full object-cover">
                                    <div th:unless="${item.imageUrl}" class="w-full h-full flex items-center justify-center text-gray-300 text-[8px]">IMG</div>
                                </div>
                                <div class="min-w-0 flex-1">
                                    <p class="text-sm font-medium text-gray-900" th:text="${item.manualNameOverride}"></p>
                                    <p class="text-xs text-gray-500" th:text="${item.setName}"></p>
                                </div>

                                <!-- Grade Input -->
                                <div class="w-24">
                                    <label class="block text-xs font-medium text-gray-500">Grade</label>
                                    <input type="text" th:name="'items[' + ${iterStat.index} + '].grade'" required
                                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-cwz-blue focus:border-cwz-blue sm:text-sm">
                                </div>

                                <!-- Upcharge Input -->
                                <div class="w-24">
                                    <label class="block text-xs font-medium text-gray-500">Upcharge ($)</label>
                                    <input type="number" step="0.01" th:name="'items[' + ${iterStat.index} + '].gradingUpcharge'" value="0.00"
                                           class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-cwz-blue focus:border-cwz-blue sm:text-sm">
                                </div>

                                <!-- Purpose -->
                                <div class="w-48">
                                    <label class="block text-xs font-medium text-gray-500">Destination</label>
                                    <select th:name="'items[' + ${iterStat.index} + '].purpose'" class="mt-1 block w-full pl-3 pr-10 py-2 text-base border-gray-300 focus:outline-none focus:ring-cwz-pink focus:border-cwz-pink sm:text-sm rounded-md">
                                        <option value="GRADED_INVENTORY" selected>Inventory</option>
                                        <option value="PERSONAL_COLLECTION">Collection</option>
                                    </select>
                                </div>
                            </div>
                        </div>
                    </li>
                </ul>
            </div>
        </form>
    </div>
</body>
</html>
