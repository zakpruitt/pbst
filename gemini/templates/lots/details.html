<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title th:text="${lot.description}">Lot Details</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="flex justify-between items-start border-b border-gray-200 pb-6 mb-6">
            <div>
                <div class="flex items-center gap-3">
                    <h1 class="text-2xl font-bold text-gray-900" th:text="${lot.description}"></h1>
                    <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                          th:classappend="${lot.status == 'ACCEPTED'} ? 'bg-green-100 text-green-800' : (${lot.status == 'REJECTED'} ? 'bg-red-100 text-red-800' : 'bg-yellow-100 text-yellow-800')"
                          th:text="${lot.status ?: 'PENDING'}">
                    </span>
                </div>
                <p class="mt-1 text-sm text-gray-500" th:text="${'Offer Date: ' + #temporals.format(lot.purchaseDate, 'MM/dd/yyyy')}"></p>
            </div>
            <div class="flex gap-3">
                <div th:if="${lot.status == null or lot.status == 'PENDING'}" class="flex gap-2">
                    <button type="button"
                            class="inline-flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-all"
                            th:attr="hx-patch=@{/api/lots/{id}/status(id=${lot.id}, status='ACCEPTED')}"
                            hx-target="body"
                            hx-swap="outerHTML">
                        Accept Offer
                    </button>
                    <button type="button"
                            class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all"
                            th:attr="hx-patch=@{/api/lots/{id}/status(id=${lot.id}, status='REJECTED')}"
                            hx-target="body"
                            hx-swap="outerHTML">
                        Reject
                    </button>
                </div>

                <a th:href="@{/lots/{id}/edit(id=${lot.id})}"
                   class="inline-flex items-center px-3 py-2 border border-gray-300 text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 transition-all">
                    Edit Lot
                </a>

                <button type="button"
                        class="inline-flex items-center px-3 py-2 border border-transparent text-sm font-medium rounded-md text-red-700 bg-red-100 hover:bg-red-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-all"
                        th:attr="hx-delete=@{/api/lots/{id}(id=${lot.id})}"
                        hx-confirm="Are you sure you want to delete this lot record entirely?"
                        hx-target="body"
                        hx-push-url="/lots">
                    Delete
                </button>
            </div>
        </div>

        <div class="grid grid-cols-1 gap-5 sm:grid-cols-3 mb-8">
            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Total Offer</dt>
                <dd class="mt-1 text-3xl font-semibold text-cwz-green" th:text="${'$' + #numbers.formatDecimal(lot.totalCost, 1, 2)}"></dd>
            </div>

            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Estimated Market Value</dt>
                <dd class="mt-1 text-3xl font-semibold text-gray-900" th:text="${'$' + #numbers.formatDecimal(lot.estimatedMarketValue, 1, 2)}"></dd>
            </div>

            <div class="px-4 py-5 bg-white shadow rounded-lg overflow-hidden sm:p-6 border border-gray-200">
                <dt class="text-sm font-medium text-gray-500 truncate">Tracked Items Count</dt>
                <dd class="mt-1 text-3xl font-semibold text-cwz-pink" th:text="${lot.trackedItems != null ? lot.trackedItems.size() : 0}"></dd>
            </div>
        </div>

        <div class="space-y-8">
            <!-- Tracked Items Section -->
            <div>
                <h2 class="text-lg font-medium text-gray-900 mb-4">Tracked Inventory</h2>
                <div th:if="${!#lists.isEmpty(lot.trackedItems)}" class="bg-white shadow overflow-hidden sm:rounded-md border border-gray-200">
                    <table class="min-w-full divide-y divide-gray-300">
                        <tbody class="divide-y divide-gray-200 bg-white">
                            <tr th:each="item : ${lot.trackedItems}" th:replace="~{fragments/tracked-item-row :: trackedItemRow(${item})}"></tr>
                        </tbody>
                    </table>
                </div>
                <p th:if="${#lists.isEmpty(lot.trackedItems)}" class="text-sm text-gray-500 italic">No items were marked for tracking in this lot.</p>
            </div>

            <!-- Snapshot Section (Raw Data) -->
            <div th:if="${lot.lotContentSnapshot}">
                <h2 class="text-lg font-medium text-gray-900 mb-4">Lot Content Snapshot</h2>
                <div class="bg-gray-50 rounded-md p-4 border border-gray-200 overflow-x-auto">
                    <pre class="text-xs text-gray-600 font-mono" th:text="${lot.lotContentSnapshot}"></pre>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
