<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Comp a New Lot</title>
</head>
<body>
<div layout:fragment="content">
    <form id="lotForm" action="/api/lots" method="post" class="space-y-8" onsubmit="prepareSnapshot()">
        <input type="hidden" name="status" value="PENDING">

        <!-- Header & Lot Details -->
        <div class="bg-white border-b border-cwz-gray pb-6">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-2xl font-bold leading-7 text-gray-900 sm:truncate">New Lot Offer</h3>
                </div>
                <div class="text-right bg-cwz-gray/20 px-4 py-2 rounded-lg border border-cwz-gray">
                    <p class="text-xs font-medium text-cwz-green uppercase tracking-wider">Total Offer</p>
                    <p id="offer-price" class="text-3xl font-bold text-cwz-green">$0.00</p>
                    <input type="hidden" name="totalCost" id="hiddenTotalCost">
                    <input type="hidden" name="estimatedMarketValue" id="hiddenEstimatedMarketValue">
                </div>
            </div>

            <div class="mt-6 grid grid-cols-1 gap-y-6 gap-x-4 sm:grid-cols-6">
                <div class="sm:col-span-3">
                    <label for="sellerName" class="block text-sm font-medium text-gray-700">Seller Name</label>
                    <input type="text" name="description" id="sellerName" placeholder="e.g. eBay Seller, Facebook Marketplace" required
                           class="mt-1 shadow-sm focus:ring-cwz-green focus:border-cwz-green block w-full sm:text-sm border-gray-300 rounded-md">
                </div>
                <div class="sm:col-span-3">
                    <label for="purchaseDate" class="block text-sm font-medium text-gray-700">Date</label>
                    <input type="date" name="purchaseDate" id="purchaseDate" th:value="${today}" required
                           class="mt-1 shadow-sm focus:ring-cwz-green focus:border-cwz-green block w-full sm:text-sm border-gray-300 rounded-md">
                </div>
            </div>
        </div>

        <!-- Comping Sheet Section -->
        <div>
            <div class="flex items-center justify-between mb-4">
                <h3 class="text-lg leading-6 font-medium text-gray-900">Comping Sheet</h3>
                <span class="text-xs text-gray-500">Items added here are saved to the lot history. Check "Track" to add to your inventory.</span>
            </div>

            <!-- Sticky Search Bar -->
            <div class="sticky top-16 z-40 bg-white pb-4 pt-2 border-b border-gray-100 shadow-sm">
                <div class="relative rounded-md shadow-sm">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <svg class="h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                            <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z" clip-rule="evenodd" />
                        </svg>
                    </div>
                    <input type="text" name="card-search" id="card-search"
                           class="focus:ring-cwz-green focus:border-cwz-green block w-full pl-10 sm:text-sm border-gray-300 rounded-md py-3"
                           placeholder="Search to add a card, slab, or sealed product..."
                           hx-get="/search/cards"
                           hx-trigger="keyup changed delay:500ms"
                           hx-target="#card-search-results"
                           hx-indicator="#search-indicator"
                           hx-vals="js:{query: document.getElementById('card-search').value}">
                    <div id="search-indicator" class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none htmx-indicator">
                        <svg class="animate-spin h-5 w-5 text-cwz-green" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                        </svg>
                    </div>
                </div>
                <!-- Search Results Dropdown -->
                <div id="card-search-results" class="absolute w-full bg-white shadow-lg rounded-md mt-1 z-20 max-h-60 overflow-y-auto"></div>
            </div>

            <!-- Comp List -->
            <div id="comp-list" class="space-y-3 mt-4">
                <!-- Rows will be added here -->
            </div>

            <!-- Add Generic Button -->
            <button type="button" class="mt-6 w-full flex justify-center items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-green"
                    hx-post="/lots/add-comp-item"
                    hx-target="#comp-list"
                    hx-swap="beforeend"
                    hx-vals="js:{itemIndex: getNextItemIndex()}">
                <svg class="-ml-1 mr-2 h-5 w-5 text-gray-400" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" aria-hidden="true">
                    <path fill-rule="evenodd" d="M10 3a1 1 0 011 1v5h5a1 1 0 110 2h-5v5a1 1 0 11-2 0v-5H4a1 1 0 110-2h5V4a1 1 0 011-1z" clip-rule="evenodd" />
                </svg>
                Add Generic Item
            </button>
        </div>

        <!-- Hidden Snapshot Field -->
        <input type="hidden" name="lotContentSnapshot" id="lotContentSnapshot">

        <!-- Footer Actions -->
        <div class="pt-6 border-t border-gray-200 flex justify-end space-x-3">
            <a href="/lots" class="bg-white py-2 px-4 border border-gray-300 rounded-md shadow-sm text-sm font-medium text-gray-700 hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-green">Cancel</a>
            <button type="submit" class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-cwz-green hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-green transition-all transform hover:scale-105">
                Save Offer
            </button>
        </div>
    </form>

    <script>
        let itemIndex = 0;
        function getNextItemIndex() { return itemIndex++; }

        document.body.addEventListener('htmx:afterSwap', function(event) {
            if (event.detail.target.id === 'card-search-results') {
                event.detail.elt.querySelectorAll('li').forEach(function(li) {
                    li.addEventListener('click', function() {
                        const cardId = li.getAttribute('data-pokemon-card-id');
                        htmx.ajax('POST', '/lots/add-comp-item', {
                            target: '#comp-list',
                            swap: 'beforeend',
                            values: { itemIndex: getNextItemIndex(), pokemonCardId: cardId }
                        });
                        document.getElementById('card-search').value = '';
                        document.getElementById('card-search-results').innerHTML = '';
                    });
                });
            }
            if (event.detail.target.id === 'comp-list') {
                updateOfferPrice();
            }
        });

        function updateOfferPrice() {
            let totalOffer = 0;
            let totalMarket = 0;

            document.querySelectorAll('.comp-item-wrapper').forEach(row => {
                const marketValue = parseFloat(row.querySelector('.market-value').value) || 0;
                const percentage = parseFloat(row.querySelector('.percentage').value) || 100;
                const quantity = parseFloat(row.querySelector('.quantity').value) || 1;

                const rowTotal = marketValue * (percentage / 100) * quantity;
                const rowMarketTotal = marketValue * quantity;

                row.querySelector('.row-total').innerText = '$' + rowTotal.toFixed(2);

                const costBasisInput = row.querySelector('.cost-basis');
                if (costBasisInput) {
                    costBasisInput.value = (rowTotal / quantity).toFixed(2);
                }

                totalOffer += rowTotal;
                totalMarket += rowMarketTotal;
            });

            document.getElementById('offer-price').innerText = '$' + totalOffer.toFixed(2);
            document.getElementById('hiddenTotalCost').value = totalOffer.toFixed(2);
            document.getElementById('hiddenEstimatedMarketValue').value = totalMarket.toFixed(2);
        }

        function prepareSnapshot() {
            const snapshot = [];
            document.querySelectorAll('.comp-item-wrapper').forEach(wrapper => {
                const row = wrapper.querySelector('.comp-item-row');
                const details = wrapper.querySelector('.details-row');

                const item = {
                    pokemonCardId: row.querySelector('input[name*="pokemonCardId"]').value,
                    name: row.querySelector('input[name*="name"]').value,
                    setName: row.querySelector('.snapshot-set').value,
                    quantity: row.querySelector('.quantity').value,
                    marketValue: row.querySelector('.market-value').value,
                    percentage: row.querySelector('.percentage').value,
                    itemType: row.querySelector('.item-type-select').value,
                    isTracked: row.querySelector('.track-checkbox').checked,
                    purpose: details.querySelector('select[name*="purpose"]').value,
                    gradingCompany: details.querySelector('select[name*="gradingCompany"]').value,
                    grade: details.querySelector('input[name*="grade"], select[name*="grade"]').value,
                };
                snapshot.push(item);
            });
            document.getElementById('lotContentSnapshot').value = JSON.stringify(snapshot);
        }

        document.getElementById('comp-list').addEventListener('input', function(e) {
            if (e.target.classList.contains('market-value') ||
                e.target.classList.contains('percentage') ||
                e.target.classList.contains('quantity')) {
                updateOfferPrice();
            }
        });
    </script>
</div>
</body>
</html>
