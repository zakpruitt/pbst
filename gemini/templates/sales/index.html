<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout" layout:decorate="~{layout/base}">
<head>
    <title>Sales</title>
</head>
<body>
    <div layout:fragment="content">
        <div class="sm:flex sm:items-center justify-between mb-6">
            <div class="sm:flex-auto">
                <h1 class="text-xl font-semibold text-gray-900">Sales History</h1>
                <p class="mt-2 text-sm text-gray-700">Track your payouts and order status.</p>
            </div>
            <div class="mt-4 sm:mt-0 sm:ml-16 sm:flex-none flex gap-3">
                <button type="button"
                        class="inline-flex items-center px-4 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-cwz-blue transition-all"
                        hx-post="/api/sales/sync"
                        hx-swap="none"
                        onclick="alert('Syncing with eBay...')">
                    Sync eBay
                </button>
                <a href="/sales/new" class="inline-flex items-center justify-center rounded-md border border-transparent bg-cwz-blue px-4 py-2 text-sm font-medium text-white shadow-sm hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 sm:w-auto transition-all">
                    Add Sale
                </a>
            </div>
        </div>

        <div class="mt-8 flex flex-col">
            <div class="-my-2 -mx-4 overflow-x-auto sm:-mx-6 lg:-mx-8">
                <div class="inline-block min-w-full py-2 align-middle md:px-6 lg:px-8">
                    <div class="overflow-hidden shadow ring-1 ring-black ring-opacity-5 md:rounded-lg">
                        <table class="min-w-full divide-y divide-gray-300">
                            <thead class="bg-gray-50">
                                <tr>
                                    <th scope="col" class="py-3.5 pl-4 pr-3 text-left text-sm font-semibold text-gray-900 sm:pl-6">Order Details</th>
                                    <th scope="col" class="px-3 py-3.5 text-left text-sm font-semibold text-gray-900">Status</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Gross</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Fees/Ship</th>
                                    <th scope="col" class="px-3 py-3.5 text-right text-sm font-semibold text-gray-900">Net Payout</th>
                                    <th scope="col" class="relative py-3.5 pl-3 pr-4 sm:pr-6">
                                        <span class="sr-only">Actions</span>
                                    </th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-200 bg-white">
                                <tr th:each="sale : ${sales}" class="hover:bg-gray-50 transition-colors">
                                    <td class="whitespace-nowrap py-4 pl-4 pr-3 text-sm sm:pl-6">
                                        <div class="flex items-center">
                                            <div class="h-10 w-10 flex-shrink-0 bg-gray-100 rounded overflow-hidden border border-gray-200 mr-3 flex items-center justify-center">
                                                <img th:if="${sale.imageUrl}" th:src="${sale.imageUrl}" class="w-full h-full object-cover">
                                                <svg th:unless="${sale.imageUrl}" class="h-5 w-5 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                                                </svg>
                                            </div>
                                            <div>
                                                <div class="font-medium text-gray-900 truncate max-w-[250px]" th:text="${sale.title}" th:title="${sale.title}"></div>
                                                <div class="text-xs text-gray-500">
                                                    <span th:text="${#temporals.format(sale.saleDate, 'MMM d, yyyy')}"></span>
                                                    <span class="mx-1">•</span>
                                                    <span th:text="${sale.buyerUsername}"></span>
                                                </div>
                                            </div>
                                        </div>
                                    </td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm">
                                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium"
                                              th:classappend="${sale.orderStatus == 'COMPLETED' or sale.orderStatus == 'SHIPPED'} ? 'bg-green-100 text-green-800' : 'bg-yellow-100 text-yellow-800'"
                                              th:text="${sale.orderStatus ?: 'PAID'}">
                                        </span>
                                    </td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-gray-500 text-right" th:text="${'$' + #numbers.formatDecimal(sale.grossAmount, 1, 2)}"></td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-red-500 text-right">
                                        <div th:text="${'-$' + #numbers.formatDecimal((sale.ebayFees ?: 0) + (sale.shippingCost ?: 0), 1, 2)}"></div>
                                    </td>
                                    <td class="whitespace-nowrap px-3 py-4 text-sm text-cwz-green font-bold text-right" th:text="${'$' + #numbers.formatDecimal(sale.netAmount, 1, 2)}"></td>
                                    <td class="relative whitespace-nowrap py-4 pl-3 pr-4 text-right text-sm font-medium sm:pr-6">
                                        <button type="button" class="text-gray-400 hover:text-red-600 transition-colors"
                                                th:attr="hx-delete=@{/api/sales/{id}(id=${sale.id})}"
                                                hx-confirm="Are you sure you want to delete this sale record?"
                                                hx-target="closest tr"
                                                hx-swap="outerHTML swap:500ms">
                                            <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
                                            </svg>
                                        </button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
