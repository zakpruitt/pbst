services:
  postgres:
    image: postgres:16-alpine
    container_name: pbst-db
    environment:
      POSTGRES_USER: pbstuser
      POSTGRES_PASSWORD: pbstpassword
      POSTGRES_DB: pbstdb
    ports:
      - "5432:5432"
    volumes:
      - pbst_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  app:
    build: .
    container_name: pbst-app
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: pbstdb
      DB_USER: pbstuser
      DB_PASS: pbstpassword
      APP_USER: ${APP_USER:-admin}
      APP_PASS: ${APP_PASS:-admin}
      EBAY_CLIENT_ID: ${EBAY_CLIENT_ID:-}
      EBAY_CLIENT_SECRET: ${EBAY_CLIENT_SECRET:-}
      EBAY_REFRESH_TOKEN: ${EBAY_REFRESH_TOKEN:-}
      POKEWALLET_API_KEY: ${POKEWALLET_API_KEY:-}
      POKEWALLET_BASE_URL: ${POKEWALLET_BASE_URL:-}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  pbst_pgdata:
