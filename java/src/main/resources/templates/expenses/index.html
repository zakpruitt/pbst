<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Expenses</h4>
    <div class="text-muted small">
        <span th:text="${count}"></span> expense<span th:if="${count != 1}">s</span> &middot;
        <span th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}"></span> total
    </div>
</div>

<form method="POST" action="/expenses" class="card mb-3">
    <div class="card-body py-2">
        <div class="row g-2 align-items-center">
            <div class="col-sm"><input name="name" type="text" class="form-control form-control-sm" placeholder="Expense name (e.g. Atlanta trip)" required></div>
            <div class="col-sm-auto"><input name="expenseDate" type="date" class="form-control form-control-sm" required></div>
            <div class="col-sm-auto">
                <div class="input-group input-group-sm" style="width:130px">
                    <span class="input-group-text">$</span>
                    <input name="cost" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" required>
                </div>
            </div>
            <div class="col-sm-auto"><button type="submit" class="btn btn-success btn-sm">+ Add</button></div>
        </div>
    </div>
</form>

<div th:if="${#lists.isEmpty(groups)}">
    <p class="text-muted">No expenses yet. Use the form above to add one.</p>
</div>

<div th:unless="${#lists.isEmpty(groups)}" id="expenses-list">
    <div th:each="group : ${groups}" class="expense-month-group mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="month-label month-pill" th:text="${group.label}"></span>
        </div>
        <table class="table table-hover bg-white mb-0 mt-2">
            <thead class="table-light">
            <tr><th style="width:100%">Expense</th><th class="text-end text-nowrap ps-4">Cost</th><th class="text-center text-nowrap ps-4" style="width:4rem"></th></tr>
            </thead>
            <tbody>
            <tr th:each="e : ${group.items}">
                <td class="align-middle">
                    <span class="fw-medium expense-name" th:attr="data-full=${e.name}" th:title="'Click to copy: ' + ${e.name}"
                          onclick="copyExpenseName(this)" th:text="${#strings.abbreviate(e.name, 45)}"></span>
                    <div class="text-muted inv-subtext" th:text="${#temporals.format(e.expenseDate, 'MMM d, yyyy')}"></div>
                </td>
                <td class="text-end align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(e.cost, 1, 2)}"></td>
                <td class="text-center align-middle ps-4">
                    <form method="POST" th:action="'/expenses/' + ${e.id} + '/delete'" onsubmit="return confirm('Delete this expense?')">
                        <button type="submit" class="btn btn-sm btn-outline-danger" title="Delete">&times;</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function copyExpenseName(el) {
    const text = el.dataset.full || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const original = el.textContent;
        el.textContent = "Copied!";
        el.classList.add("text-success");
        setTimeout(() => { el.textContent = original; el.classList.remove("text-success"); }, 900);
    });
}
</script>

</div>
</body>
</html>
