<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="lot-row(item)"
     class="item-row card mb-2"
     th:attr="x-data='{ name: \'' + ${item.name} + '\', qty: ' + ${item.qty} + ', market: ' + ${item.marketPrice} + ', pct: ' + ${item.percentage} + ', type: \'' + ${item.itemType} + '\', tracked: ' + ${item.isTracked} + ', gradingCompany: \'' + ${item.gradingCompany != null ? item.gradingCompany : 'PSA'} + '\', grade: \'\', cardId: \'' + ${item.pokemonCardId != null ? item.pokemonCardId : ''} + '\', imageUrl: \'' + ${item.imageUrl != null ? item.imageUrl : ''} + '\', setName: \'' + ${item.setName != null ? item.setName : ''} + '\', cardNumber: \'' + ${item.cardNumber != null ? item.cardNumber : ''} + '\', rarity: \'' + ${item.rarity != null ? item.rarity : ''} + '\', get offered(){ return (this.qty * this.market * this.pct / 100).toFixed(2) }, get isGraded(){ return this.type === \'GRADED_CARD\' }, get borderColor(){ if(this.type===\'GRADED_CARD\') return \'#f0b429\'; if(this.type===\'SEALED_PRODUCT\') return \'#0d6efd\'; return \'transparent\'; } }'"
     :style="'border-left:3px solid '+borderColor">

<div class="d-flex gap-3 p-2 align-items-center">

    <template x-if="imageUrl">
        <div class="lot-img-wrap">
            <img :src="imageUrl" :data-card-img="imageUrl"
                 class="img-fluid rounded shadow-sm"
                 style="object-fit: contain;">
        </div>
    </template>

    <div class="flex-grow-1 d-flex flex-column lot-row-content">

        <div class="d-flex gap-2 align-items-center w-100">
            <input class="form-control form-control-sm flex-grow-1"
                   x-model="name" placeholder="Name" style="min-width: 0;">

            <div class="d-flex gap-2 ms-auto" style="flex-shrink: 0;">
                <select class="form-select form-select-sm" style="width: 210px;"
                        x-model="type">
                    <option value="RAW_CARD">Raw Card</option>
                    <option value="GRADED_CARD">Graded Card</option>
                    <option value="SEALED_PRODUCT">Sealed</option>
                    <option value="OTHER">Other</option>
                </select>

                <button type="button" class="btn btn-sm btn-outline-danger p-0 lot-btn-sq"
                        @click="$el.closest('.item-row').remove(); $dispatch('lot:changed')">&#10005;</button>
            </div>
        </div>

        <div class="d-flex align-items-start w-100 lot-row-middle">
            <div class="text-muted text-truncate flex-grow-1 lot-row-meta"
                 th:if="${item.setName != null and !item.setName.isEmpty()}">
                <span th:text="${item.setName}"></span>
                <span th:if="${item.cardNumber != null and !item.cardNumber.isEmpty()}" th:text="' #' + ${item.cardNumber}"></span>
            </div>

            <template x-if="isGraded">
                <div class="d-flex gap-2 ms-auto" style="flex-shrink: 0;">
                    <div class="input-group input-group-sm" style="width: 210px;">
                        <select class="form-select shadow-none" style="width: 110px; flex: none;" x-model="gradingCompany">
                            <option value="PSA">PSA</option>
                            <option value="BGS">BGS</option>
                            <option value="CGC">CGC</option>
                            <option value="TAG">TAG</option>
                        </select>
                        <input type="text" class="form-control shadow-none text-center px-2"
                               style="flex-grow: 1;" placeholder="Grade" x-model="grade">
                    </div>
                    <div style="width: 31px;"></div>
                </div>
            </template>
        </div>

        <div class="d-flex align-items-center gap-2 mt-1 lot-row-pricing">
            <span class="text-muted">Qty</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:50px" min="1" x-model.number="qty">
            <span class="text-muted">Mkt $</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:80px" step="0.01" x-model.number="market">
            <span class="text-muted">%</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:55px" min="0" max="100" x-model.number="pct">
            <span class="text-muted">&rarr;</span>
            <strong class="text-success" x-text="'$'+offered"></strong>

            <label class="d-flex align-items-center gap-2 mb-0 ms-auto" style="cursor: pointer;">
                <span class="text-muted small">Track</span>
                <input type="checkbox" class="form-check-input mt-0 lot-track-check"
                       x-model="tracked">
            </label>
        </div>

    </div>
</div>
</div>
</body>
</html>
