spring.application.name=collectingwithzak
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

# JPA
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Thymeleaf
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# DevTools
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true

# Server
server.port=8080

# Auth
app.user=${APP_USER:admin}
app.pass=${APP_PASS:admin}

# eBay
ebay.client-id=${EBAY_CLIENT_ID:}
ebay.client-secret=${EBAY_CLIENT_SECRET:}
ebay.refresh-token=${EBAY_REFRESH_TOKEN:}

# PokeWallet
pokewallet.api-key=${POKEWALLET_API_KEY:}
pokewallet.base-url=${POKEWALLET_BASE_URL:}
