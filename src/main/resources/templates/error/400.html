<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<div class="text-center py-5">
    <h4 class="mb-3">400 &mdash; Bad Request</h4>
    <p class="text-muted" th:if="${message}" th:text="${message}"></p>
    <p class="text-muted" th:unless="${message}">Something was wrong with your request.</p>
    <a href="/" class="btn btn-outline-secondary btn-sm mt-2">Back to Dashboard</a>
</div>

</div>
</body>
</html>
