<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Expenses</h4>
    <a href="/expenses/new" class="btn btn-success btn-sm">+ New Expense</a>
</div>

<div class="card mb-4">
    <div class="card-body">
        <div class="row text-center g-2">
            <div class="col">
                <div class="text-muted small">Expenses</div>
                <div class="fw-semibold" th:text="${count}"></div>
            </div>
            <div class="col">
                <div class="text-muted small">Total</div>
                <div class="fw-semibold text-danger" th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small">Average</div>
                <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(avg, 1, 2)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small">Last 30 Days</div>
                <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(total30, 1, 2)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small">This Month</div>
                <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(totalMonth, 1, 2)}"></div>
            </div>
        </div>
    </div>
</div>

<div th:if="${#lists.isEmpty(groups)}">
    <p class="text-muted">No expenses yet. <a href="/expenses/new">Add one</a>.</p>
</div>

<div th:unless="${#lists.isEmpty(groups)}" id="expenses-list">
    <div th:each="group : ${groups}" class="expense-month-group mb-4">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <span class="month-label month-pill" th:classappend="${group.monthClass}" th:text="${group.label}"></span>
            <span class="text-muted small" th:text="'$' + ${#numbers.formatDecimal(group.subtotal, 1, 2)}"></span>
        </div>
        <table class="table table-sm table-hover bg-white mb-0 mt-2">
            <thead class="table-light">
            <tr><th style="width:100%">Expense</th><th class="text-nowrap ps-4">Date</th><th class="text-end text-nowrap ps-4">Cost</th><th class="text-center text-nowrap ps-4" style="width:4rem"></th></tr>
            </thead>
            <tbody>
            <tr th:each="e : ${group.items}">
                <td class="align-middle">
                    <span class="fw-medium expense-name" th:attr="data-full=${e.name}" th:title="'Click to copy: ' + ${e.name}"
                          onclick="copyExpenseName(this)" th:text="${#strings.abbreviate(e.name, 45)}"></span>
                </td>
                <td class="align-middle text-nowrap ps-4 text-muted" th:text="${#temporals.format(e.expenseDate, 'MMM d, yyyy')}"></td>
                <td class="text-end align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(e.cost, 1, 2)}"></td>
                <td class="text-center align-middle ps-4">
                    <form method="POST" th:action="'/expenses/' + ${e.id} + '/delete'" onsubmit="return confirm('Delete this expense?')">
                        <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
function copyExpenseName(el) {
    const text = el.dataset.full || el.textContent;
    navigator.clipboard.writeText(text).then(() => {
        const original = el.textContent;
        el.textContent = "Copied!";
        el.classList.add("text-success");
        setTimeout(() => { el.textContent = original; el.classList.remove("text-success"); }, 900);
    });
}
</script>

</div>
</body>
</html>
