<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/expenses" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Expenses</a>
<h4 class="mb-4">New Expense</h4>

<form method="POST" action="/expenses">
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label small text-muted mb-1">Name</label>
                    <input name="name" type="text" class="form-control form-control-sm" placeholder="e.g. Atlanta trip, sleeves, top loaders" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Date</label>
                    <input name="expenseDate" type="date" class="form-control form-control-sm" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Cost</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input name="cost" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="text-end">
        <button type="submit" class="btn btn-success btn-sm">Save Expense</button>
    </div>
</form>

</div>
</body>
</html>
