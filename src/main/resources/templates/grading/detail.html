<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/grading" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Grading</a>

<div class="d-flex justify-content-between align-items-start mb-4">
    <div class="flex-grow-1 me-3 min-w-0">
        <h4 class="mb-1" th:text="${submission.submissionName}"></h4>
        <small class="text-muted">
            <span th:if="${submission.sendDate != null}" th:text="'Sent ' + ${#temporals.format(submission.sendDate, 'MMM d, yyyy')}"></span>
            <span th:if="${submission.returnDate != null}" th:text="' · Returned ' + ${#temporals.format(submission.returnDate, 'MMM d, yyyy')}"></span>
        </small>
    </div>
    <div class="d-flex gap-2 flex-shrink-0">
        <a th:href="'/grading/' + ${submission.id} + '/edit'" class="btn btn-outline-secondary btn-sm">Edit</a>
        <form method="POST" th:action="'/grading/' + ${submission.id} + '/delete'" class="d-inline"
              onsubmit="return confirm('Delete this submission? Attached items will return to inventory.')">
            <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
        </form>
    </div>
</div>

<div th:if="${submission.notes != null and !submission.notes.isEmpty()}" class="card mb-3">
    <div class="card-body py-2 px-3">
        <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Notes</div>
        <div class="small" th:text="${submission.notes}"></div>
    </div>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row text-center">
            <div class="col"><div class="text-muted small text-uppercase">Item Total</div><div class="fw-semibold" th:text="${submission.items != null ? submission.items.size() : 0}"></div></div>
            <div class="col"><div class="text-muted small text-uppercase">Sub. Cost</div><div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(submission.submissionCost, 1, 2)}"></div></div>
            <div th:if="${submission.status == 'RETURNED'}" class="col"><div class="text-muted small text-uppercase">Upcharges</div><div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(submission.upchargeTotal, 1, 2)}"></div></div>
            <div th:if="${submission.status == 'RETURNED'}" class="col"><div class="text-muted small text-uppercase">Grand Total</div><div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(submission.grandTotal, 1, 2)}"></div></div>
            <div class="col"><div class="text-muted small text-uppercase">Company</div>
                <div><span class="badge"
                           th:classappend="${submission.company == 'PSA' ? 'grade-psa' : (submission.company == 'BGS' ? 'grade-bgs' : (submission.company == 'CGC' ? 'grade-cgc' : (submission.company == 'TAG' ? 'grade-tag' : 'bg-secondary')))}"
                           th:text="${submission.company}"></span></div>
            </div>
            <div class="col"><div class="text-muted small text-uppercase">Status</div>
                <div><span class="badge" th:classappend="${submission.status == 'RETURNED' ? 'bg-success' : (submission.status == 'IN_GRADING' ? 'bg-primary' : 'bg-warning text-dark')}" th:text="${submission.status == 'RETURNED' ? 'Returned' : (submission.status == 'IN_GRADING' ? 'In Grading' : (submission.status == 'PREPPING' ? 'Prepping' : (submission.status == 'ACCEPTED' ? 'Accepted' : (submission.status == 'REJECTED' ? 'Rejected' : 'Pending'))))}"></span></div>
            </div>
        </div>
    </div>
</div>

<!-- Record Grades form (IN_GRADING) -->
<div th:if="${submission.status == 'IN_GRADING' and submission.items != null and !submission.items.isEmpty()}">
    <div class="mb-4">
        <span class="month-pill section-pill d-inline-block mb-2">Record Grades</span>
        <table class="table table-sm table-hover bg-white mb-0">
            <thead class="table-light"><tr><th style="width:100%">Card</th><th class="text-end text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4" style="width:100px">New Grade</th><th class="text-end text-nowrap ps-4" style="width:100px">Upcharge</th></tr></thead>
            <tbody>
            <tr th:each="item : ${submission.items}" th:attr="data-item-id=${item.id}">
                <td>
                    <div th:replace="~{fragments/items :: item-cell(item=${item})}"></div>
                </td>
                <td class="text-end align-middle text-nowrap ps-4" th:text="'$' + ${#numbers.formatDecimal(item.costBasis, 1, 2)}"></td>
                <td class="text-center align-middle ps-4"><input type="text" class="form-control form-control-sm grade-input" placeholder="e.g. 10"></td>
                <td class="text-end align-middle ps-4"><input type="number" step="0.01" min="0" class="form-control form-control-sm upcharge-input" value="0"></td>
            </tr>
            </tbody>
        </table>
        <div class="d-flex justify-content-end mt-3">
            <button type="button" class="btn btn-primary btn-sm" onclick="recordReturn()">&#128203; Record Return</button>
        </div>
    </div>
</div>

<!-- Items table (not IN_GRADING) -->
<div th:if="${submission.status != 'IN_GRADING' and submission.items != null and !submission.items.isEmpty()}">
    <div class="mb-4">
        <span class="month-pill section-pill d-inline-block mb-2">Items</span>
        <table class="table table-sm table-hover bg-white mb-0">
            <thead class="table-light"><tr><th style="width:100%">Card</th><th class="text-center text-nowrap ps-4">Type</th><th class="text-end text-nowrap ps-4">Cost Basis</th><th class="text-end text-nowrap ps-4">Upcharge</th><th class="text-end text-nowrap ps-4">Grand Total</th></tr></thead>
            <tbody>
            <tr th:each="item : ${submission.items}">
                <td>
                    <div th:replace="~{fragments/items :: item-cell(item=${item})}"></div>
                </td>
                <td class="text-center align-middle text-nowrap ps-4">
                    <th:block th:replace="~{fragments/items :: type-badge(item=${item})}"></th:block>
                </td>
                <td class="text-end align-middle text-nowrap ps-4" th:text="'$' + ${#numbers.formatDecimal(item.costBasis, 1, 2)}"></td>
                <td class="text-end align-middle text-nowrap ps-4 text-muted" th:text="${item.gradedDetails != null and item.gradedDetails.gradingUpcharge != 0 ? '$' + #numbers.formatDecimal(item.gradedDetails.gradingUpcharge, 1, 2) : '—'}"></td>
                <td class="text-end align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.totalCostBasis, 1, 2)}"></td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
<p th:if="${submission.items == null or submission.items.isEmpty()}" class="text-muted small">No items attached.</p>

<div th:if="${submission.status == 'PREPPING' and submission.items != null and !submission.items.isEmpty()}" class="d-flex justify-content-end">
    <form method="POST" th:action="'/grading/' + ${submission.id} + '/advance'">
        <input type="hidden" name="new_status" value="IN_GRADING">
        <button type="submit" class="btn btn-warning btn-sm">&#9993; Mark Sent</button>
    </form>
</div>

<script th:if="${submission.status == 'IN_GRADING'}" th:inline="javascript">
var submissionId = /*[[${submission.id}]]*/ 0;
function recordReturn() {
    const grades = [];
    document.querySelectorAll('tr[data-item-id]').forEach(row => {
        grades.push({
            itemId: parseInt(row.dataset.itemId),
            grade: row.querySelector('.grade-input').value.trim(),
            upcharge: parseFloat(row.querySelector('.upcharge-input').value) || 0
        });
    });
    fetch('/grading/' + submissionId + '/return', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ grades: grades })
    }).then(r => { if (r.ok || r.redirected) window.location.reload(); else alert('Error recording return'); });
}
</script>

</div>
</body>
</html>
