<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/grading" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Grading</a>
<h4 class="mb-4">New Submission</h4>

<form method="POST" action="/grading">
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title mb-3">Submission Details</h6>
            <div class="row g-2">
                <div class="col-sm-4"><label class="form-label small text-muted mb-1">Grading Company</label>
                    <select name="company" class="form-select form-select-sm" required>
                        <option value="PSA">PSA</option><option value="BGS">BGS</option><option value="CGC">CGC</option><option value="TAG">TAG</option>
                    </select>
                </div>
                <div class="col-sm-4"><label class="form-label small text-muted mb-1">Submission Method</label><input name="submissionMethod" class="form-control form-control-sm" placeholder="e.g. Bulk, Regular"></div>
                <div class="col-sm-4"><label class="form-label small text-muted mb-1">Total Cost ($)</label><input name="submissionCost" type="number" step="0.01" min="0" class="form-control form-control-sm" placeholder="Leave blank if unknown"></div>
            </div>
            <div class="mt-2"><label class="form-label small text-muted mb-1">Notes</label><textarea name="notes" class="form-control form-control-sm" rows="2" placeholder="Optional notes about this submission"></textarea></div>
        </div>
    </div>

    <div th:if="${#lists.isEmpty(rawItems) and #lists.isEmpty(gradedItems)}" class="card mb-3">
        <div class="card-body text-muted">No items in your inventory yet. <a href="/lots/new">Add a lot</a> and mark cards as tracked.</div>
    </div>

    <div th:if="${!#lists.isEmpty(rawItems)}" class="mb-4">
        <span class="month-pill section-pill d-inline-block mb-2">Raw Cards</span>
        <table class="table table-hover bg-white mb-0">
            <thead class="table-light"><tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Type</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4" style="width:3rem"></th></tr></thead>
            <tbody>
            <tr th:each="item : ${rawItems}">
                <td>
                    <div th:replace="~{fragments/items :: item-cell(item=${item})}"></div>
                </td>
                <td class="text-center align-middle text-nowrap ps-4">
                    <th:block th:replace="~{fragments/items :: type-badge(item=${item})}"></th:block>
                </td>
                <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.costBasis, 1, 2)}"></td>
                <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? '$' + #numbers.formatDecimal(item.pokemonCard.marketPrice, 1, 2) : '—'}"></td>
                <td class="text-center align-middle ps-4"><input type="checkbox" name="itemIds" th:value="${item.id}" class="form-check-input item-cb"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div th:if="${!#lists.isEmpty(gradedItems)}" class="mb-4">
        <span class="month-pill section-pill d-inline-block mb-2">Previously Graded</span>
        <table class="table table-hover bg-white mb-0">
            <thead class="table-light"><tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Type</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4" style="width:3rem"></th></tr></thead>
            <tbody>
            <tr th:each="item : ${gradedItems}">
                <td>
                    <div th:replace="~{fragments/items :: item-cell(item=${item})}"></div>
                </td>
                <td class="text-center align-middle text-nowrap ps-4">
                    <th:block th:replace="~{fragments/items :: type-badge(item=${item})}"></th:block>
                </td>
                <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.costBasis, 1, 2)}"></td>
                <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? '$' + #numbers.formatDecimal(item.pokemonCard.marketPrice, 1, 2) : '—'}"></td>
                <td class="text-center align-middle ps-4"><input type="checkbox" name="itemIds" th:value="${item.id}" class="form-check-input item-cb"></td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <span class="text-muted small">Submission name is auto-generated (e.g. PSA Submission #1)</span>
        <button type="submit" class="btn btn-success">Create Submission</button>
    </div>
</form>

</div>
</body>
</html>
