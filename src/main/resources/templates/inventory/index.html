<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0">Inventory</h4>
    <a href="/inventory/new" class="btn btn-success btn-sm">Add Item</a>
</div>

<div th:replace="~{inventory/index :: inventory-page}"></div>

</div>

<!-- HTMX-swappable fragment -->
<div th:fragment="inventory-page" id="inventory-page">
<ul class="nav nav-tabs mb-4">
    <li class="nav-item">
        <a class="nav-link" th:classappend="${data.purpose == 'INVENTORY' ? 'active' : ''}"
           href="/inventory?purpose=INVENTORY"
           hx-get="/inventory?purpose=INVENTORY"
           hx-target="#inventory-page"
           hx-swap="outerHTML"
           hx-push-url="true">Inventory</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${data.purpose == 'IN_GRADING' ? 'active' : ''}"
           href="/inventory?purpose=IN_GRADING"
           hx-get="/inventory?purpose=IN_GRADING"
           hx-target="#inventory-page"
           hx-swap="outerHTML"
           hx-push-url="true">In Grading</a>
    </li>
    <li class="nav-item">
        <a class="nav-link" th:classappend="${data.purpose == 'PERSONAL_COLLECTION' ? 'active' : ''}"
           href="/inventory?purpose=PERSONAL_COLLECTION"
           hx-get="/inventory?purpose=PERSONAL_COLLECTION"
           hx-target="#inventory-page"
           hx-swap="outerHTML"
           hx-push-url="true">Personal Collection</a>
    </li>
</ul>

<div th:if="${!#lists.isEmpty(data.items)}" class="card mb-3">
    <div class="card-body">
        <div class="row text-center">
            <div class="col">
                <div class="text-muted small text-uppercase">Cost</div>
                <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(data.totalCost, 1, 2)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small text-uppercase">Market</div>
                <div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(data.totalMarket, 1, 2)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small text-uppercase">Items</div>
                <div class="fw-semibold" th:text="${#lists.size(data.items)}"></div>
            </div>
            <div class="col">
                <div class="text-muted small text-uppercase">Gain/Loss</div>
                <div class="fw-semibold" th:classappend="${data.totalMarket - data.totalCost >= 0 ? 'text-success' : 'text-danger'}"
                     th:text="'$' + ${#numbers.formatDecimal(data.totalMarket - data.totalCost, 1, 2)}"></div>
            </div>
        </div>
    </div>
</div>

<div id="inventory-list">
    <p th:if="${#lists.isEmpty(data.items)}" class="text-muted">No items in this category.</p>

    <div th:if="${!#lists.isEmpty(data.items)}">

        <div th:if="${!#lists.isEmpty(data.rawItems)}" class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="month-pill section-pill d-inline-block">Raw</span>
                <span class="text-muted small" th:text="${#lists.size(data.rawItems)} + ' items'"></span>
            </div>
            <table class="table table-hover bg-white mb-0">
                <thead class="table-light">
                <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4"></th></tr>
                </thead>
                <tbody>
                <tr th:each="item : ${data.rawItems}" th:with="mkt=${item.marketValueAtPurchase != 0 ? item.marketValueAtPurchase : (item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? item.pokemonCard.marketPrice : 0)}">
                    <td>
                        <div th:replace="~{fragments/items :: item-cell-detailed(item=${item})}"></div>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4 fw-medium"
                        th:title="${item.gradingFee > 0 ? 'Lot $' + #numbers.formatDecimal(item.costBasis, 1, 2) + ' + Grading $' + #numbers.formatDecimal(item.gradingFee, 1, 2) : ''}"
                        th:text="'$' + ${#numbers.formatDecimal(item.totalCostBasis, 1, 2)}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${mkt != 0 ? '$' + #numbers.formatDecimal(mkt, 1, 2) : '—'}"></td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <a th:href="'/inventory/' + ${item.id} + '/edit'" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${!#lists.isEmpty(data.gradedItems)}" class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="month-pill section-pill d-inline-block">Graded</span>
                <span class="text-muted small" th:text="${#lists.size(data.gradedItems)} + ' items'"></span>
            </div>
            <table class="table table-hover bg-white mb-0">
                <thead class="table-light">
                <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Grade</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4"></th></tr>
                </thead>
                <tbody>
                <tr th:each="item : ${data.gradedItems}" th:with="mkt=${item.marketValueAtPurchase != 0 ? item.marketValueAtPurchase : (item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? item.pokemonCard.marketPrice : 0)}">
                    <td>
                        <div th:replace="~{fragments/items :: item-cell-detailed(item=${item})}"></div>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <th:block th:replace="~{fragments/items :: type-badge(item=${item})}"></th:block>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4 fw-medium"
                        th:title="${item.gradingFee > 0 ? 'Lot $' + #numbers.formatDecimal(item.costBasis, 1, 2) + ' + Grading $' + #numbers.formatDecimal(item.gradingFee, 1, 2) : ''}"
                        th:text="'$' + ${#numbers.formatDecimal(item.totalCostBasis, 1, 2)}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${mkt != 0 ? '$' + #numbers.formatDecimal(mkt, 1, 2) : '—'}"></td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <a th:href="'/inventory/' + ${item.id} + '/edit'" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${!#lists.isEmpty(data.sealedItems)}" class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="month-pill section-pill d-inline-block">Sealed</span>
                <span class="text-muted small" th:text="${#lists.size(data.sealedItems)} + ' items'"></span>
            </div>
            <table class="table table-hover bg-white mb-0">
                <thead class="table-light">
                <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4"></th></tr>
                </thead>
                <tbody>
                <tr th:each="item : ${data.sealedItems}" th:with="mkt=${item.marketValueAtPurchase != 0 ? item.marketValueAtPurchase : (item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? item.pokemonCard.marketPrice : 0)}">
                    <td>
                        <div th:replace="~{fragments/items :: item-cell-detailed(item=${item})}"></div>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.totalCostBasis, 1, 2)}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${mkt != 0 ? '$' + #numbers.formatDecimal(mkt, 1, 2) : '—'}"></td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <a th:href="'/inventory/' + ${item.id} + '/edit'" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${!#lists.isEmpty(data.otherItems)}" class="mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="month-pill section-pill d-inline-block">Other</span>
                <span class="text-muted small" th:text="${#lists.size(data.otherItems)} + ' items'"></span>
            </div>
            <table class="table table-hover bg-white mb-0">
                <thead class="table-light">
                <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th><th class="text-center text-nowrap ps-4"></th></tr>
                </thead>
                <tbody>
                <tr th:each="item : ${data.otherItems}" th:with="mkt=${item.marketValueAtPurchase != 0 ? item.marketValueAtPurchase : (item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? item.pokemonCard.marketPrice : 0)}">
                    <td>
                        <div th:replace="~{fragments/items :: item-cell-detailed(item=${item})}"></div>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.totalCostBasis, 1, 2)}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${mkt != 0 ? '$' + #numbers.formatDecimal(mkt, 1, 2) : '—'}"></td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <a th:href="'/inventory/' + ${item.id} + '/edit'" class="btn btn-outline-secondary btn-sm">Edit</a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>
</div>

</body>
</html>
