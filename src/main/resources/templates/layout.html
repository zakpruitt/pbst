<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collectingwithzak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body>

  <nav class="navbar navbar-expand-lg mb-4 py-2">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/">collectingwithzak</a>
      <div class="navbar-nav flex-row gap-3 ms-auto align-items-center">
        <a class="nav-link" th:classappend="${page == 'dashboard' ? 'active-page' : ''}" href="/">Dashboard</a>
        <a class="nav-link" th:classappend="${page == 'lots' ? 'active-page' : ''}" href="/lots">Lots</a>
        <a class="nav-link" th:classappend="${page == 'sales' ? 'active-page' : ''}" href="/sales">Sales</a>
        <a class="nav-link" th:classappend="${page == 'inventory' ? 'active-page' : ''}" href="/inventory">Inventory</a>
        <a class="nav-link" th:classappend="${page == 'grading' ? 'active-page' : ''}" href="/grading">Grading</a>
        <a class="nav-link" th:classappend="${page == 'expenses' ? 'active-page' : ''}" href="/expenses">Expenses</a>
        <form method="POST" th:action="@{/logout}" class="d-inline">
          <button type="submit" class="btn btn-sm btn-outline-secondary">Logout</button>
        </form>
      </div>
    </div>
  </nav>

  <main class="container pb-4">
    <div layout:fragment="content"></div>
  </main>

  <footer class="border-top mt-auto py-3">
    <div class="container">
      <span class="text-muted small">&copy; <span th:text="${#dates.format(#dates.createNow(), 'yyyy')}"></span> collectingwithzak. All rights reserved.</span>
    </div>
  </footer>

  <div id="cp"><img src="" alt=""></div>
  <script src="/static/js/app.js"></script>

</body>
</html>
