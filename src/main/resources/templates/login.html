<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — collectingwithzak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root { --accent: #27ae60; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1117;
      overflow: hidden;
      position: relative;
    }

    #sprites {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
    }
    .sprite {
      position: absolute;
      image-rendering: pixelated;
      opacity: 0;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translateY(0)      rotate(0deg); opacity: 0;    }
      8%   {                                              opacity: 0.6;  }
      92%  {                                              opacity: 0.6;  }
      100% { transform: translateY(-130px) rotate(5deg); opacity: 0;    }
    }

    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.52);
      z-index: 1;
    }

    .login-card {
      position: relative;
      z-index: 2;
      width: 380px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(22,27,34,0.93);
      backdrop-filter: blur(14px);
      padding: 2rem;
      box-shadow: 0 24px 64px rgba(0,0,0,0.65);
    }

    .login-card .form-control {
      background: #0d1117;
      border-color: rgba(255,255,255,0.12);
      color: #e6edf3;
    }
    .login-card .form-control:focus {
      background: #0d1117;
      border-color: var(--accent);
      color: #e6edf3;
      box-shadow: 0 0 0 3px rgba(39,174,96,0.2);
    }
    .login-card .form-label { color: #8b949e; font-size: .85rem; margin-bottom: .3rem; }

    .btn-login {
      background: var(--accent);
      border: none;
      color: #fff;
      font-weight: 600;
      letter-spacing: .01em;
    }
    .btn-login:hover { background: #1e8449; color: #fff; }

    .brand-name {
      color: #e6edf3;
      font-weight: 700;
      font-size: 1.1rem;
      letter-spacing: -.01em;
      vertical-align: middle;
    }
    .gallade {
      image-rendering: pixelated;
      display: block;
      margin: 0 auto 6px;
    }
  </style>
</head>
<body>
  <div id="sprites"></div>
  <div class="overlay"></div>

  <div class="login-card">
    <div class="text-center mb-4">
      <img class="gallade" height="96"
           src="https://raw.githubusercontent.com/msikma/pokesprite/refs/heads/master/pokemon-gen7x/shiny/gallade-mega.png"
           alt="Mega Gallade">
      <div class="brand-name mt-1">collectingwithzak</div>
    </div>

    <div th:if="${param.error}" class="alert alert-danger py-2 small mb-3">
      Invalid username or password.
    </div>
    <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3">
      You have been logged out.
    </div>

    <form method="POST" th:action="@{/login}">
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input name="username" type="text" class="form-control" required autofocus>
      </div>
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input name="password" type="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-login w-100 mt-1">Sign in</button>
    </form>
  </div>

  <script src="/static/js/pokemon-names.js"></script>
  <script>
    const REGULAR = 'https://raw.githubusercontent.com/msikma/pokesprite/refs/heads/master/pokemon-gen7x/regular/';
    const SHINY   = 'https://raw.githubusercontent.com/msikma/pokesprite/refs/heads/master/pokemon-gen7x/shiny/';

    const container = document.getElementById('sprites');

    for (let i = 0; i < 12; i++) {
      const name  = POKEMON_NAMES[Math.floor(Math.random() * POKEMON_NAMES.length)];
      const base  = Math.random() < 0.28 ? SHINY : REGULAR;
      const size  = 80 + Math.floor(Math.random() * 80);
      const dur   = 16 + Math.random() * 18;
      const delay = -(Math.random() * dur);

      const img = document.createElement('img');
      img.src = base + name + '.png';
      img.className = 'sprite';
      img.style.cssText = [
        `width:${size}px`,
        `left:${Math.random() * 100}%`,
        `top:${8 + Math.random() * 84}%`,
        `animation-duration:${dur}s`,
        `animation-delay:${delay}s`,
      ].join(';');
      img.onerror = () => img.remove();
      container.appendChild(img);
    }
  </script>
</body>
</html>
