<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — collectingwithzak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <link href="/static/css/login.css" rel="stylesheet">
</head>
<body>
  <div id="sprites"></div>
  <div class="overlay"></div>

  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-body p-4">
        <div class="text-center mb-4">
          <div class="brand-name">collectingwithzak</div>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2 small mb-3">
          Invalid username or password.
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2 small mb-3">
          You have been logged out.
        </div>

        <form method="POST" th:action="@{/login}">
          <div class="mb-3">
            <label class="form-label small text-muted">Username</label>
            <input name="username" type="text" class="form-control form-control-sm" required autofocus>
          </div>
          <div class="mb-3">
            <label class="form-label small text-muted">Password</label>
            <input name="password" type="password" class="form-control form-control-sm" required>
          </div>
          <button type="submit" class="btn btn-success w-100 mt-1">Sign in</button>
        </form>
      </div>
    </div>
  </div>

  <script src="/static/js/pokemon-names.js"></script>
  <script src="/static/js/login-sprites.js"></script>
</body>
</html>
