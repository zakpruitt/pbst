<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<div class="d-flex justify-content-between align-items-center mb-4">
  <h4 class="mb-0">Lots</h4>
  <a href="/lots/new" class="btn btn-success btn-sm">+ New Lot</a>
</div>

<div th:if="${#lists.isEmpty(groups)}">
  <p class="text-muted">No lots yet. <a href="/lots/new">Add one</a>.</p>
</div>

<div th:unless="${#lists.isEmpty(groups)}">
    <div class="card mb-3" x-data="lotFilter()">
        <div class="card-body py-2">
            <div class="row g-2 align-items-center">
                <div class="col-sm"><input type="search" class="form-control form-control-sm" placeholder="Filter by seller..." x-model="query" @input="apply()"></div>
                <div class="col-sm-auto">
                    <select class="form-select form-select-sm" x-model="status" @change="apply()">
                        <option value="">All statuses</option>
                        <option value="ACCEPTED">Accepted</option>
                        <option value="PENDING">Pending</option>
                        <option value="REJECTED">Rejected</option>
                    </select>
                </div>
                <div class="col-sm-auto text-muted small" x-text="summary"></div>
            </div>
        </div>
    </div>

    <div id="lots-list">
        <div th:each="group : ${groups}" class="lot-month-group mb-4">
            <div class="d-flex justify-content-between align-items-center mb-2">
                <span class="month-label month-pill" th:classappend="${group.monthClass}" th:text="${group.label}"></span>
                <span class="text-muted small" th:text="'$' + ${#numbers.formatDecimal(group.subtotal, 1, 2)} + ' spent'"></span>
            </div>
            <table class="table table-sm table-hover bg-white mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width:100%">Seller</th>
                    <th class="text-center text-nowrap ps-4">Items</th>
                    <th class="text-center text-nowrap ps-4">Cost</th>
                    <th class="text-center text-nowrap ps-4">EMV</th>
                    <th class="text-center text-nowrap ps-4">Status</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="lot : ${group.items}" class="lot-row" style="cursor:pointer"
                    th:onclick="'window.location=\'/lots/' + ${lot.id} + '\''"
                    th:attr="data-seller=${lot.sellerName},data-status=${lot.status}">
                    <td class="align-middle">
                        <span class="fw-medium" th:text="${lot.sellerName}"></span>
                        <div class="text-muted inv-subtext" th:text="${lot.purchaseDate != null ? #temporals.format(lot.purchaseDate, 'MMM d, yyyy') : ''}"></div>
                    </td>
                    <td class="text-center align-middle text-nowrap ps-4" th:text="${lot.trackedItems != null ? lot.trackedItems.size() : 0}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(lot.totalCost, 1, 2)}"></td>
                    <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${lot.estimatedMarketValue != 0 ? '$' + #numbers.formatDecimal(lot.estimatedMarketValue, 1, 2) : '—'}"></td>
                    <td class="text-center align-middle text-nowrap ps-4">
                        <span class="badge"
                              th:classappend="${lot.status == 'ACCEPTED' ? 'bg-success' : (lot.status == 'REJECTED' ? 'bg-danger' : 'bg-warning text-dark')}"
                              th:text="${lot.status == 'ACCEPTED' ? 'Accepted' : (lot.status == 'REJECTED' ? 'Rejected' : 'Pending')}"></span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script>
    function lotFilter() {
        return {
            query: "", status: "", summary: "",
            apply() {
                const q = this.query.trim().toLowerCase();
                const status = this.status;
                let shown = 0;
                document.querySelectorAll(".lot-month-group").forEach(group => {
                    let groupShown = 0;
                    group.querySelectorAll(".lot-row").forEach(row => {
                        const seller = (row.dataset.seller || "").toLowerCase();
                        const rowStatus = row.dataset.status || "";
                        const visible = (!q || seller.includes(q)) && (!status || rowStatus === status);
                        row.style.display = visible ? "" : "none";
                        if (visible) { groupShown++; shown++; }
                    });
                    group.style.display = groupShown === 0 ? "none" : "";
                });
                this.summary = (q || status) ? `${shown} match${shown === 1 ? "" : "es"}` : "";
            },
        };
    }
    </script>
</div>

</div>
</body>
</html>
