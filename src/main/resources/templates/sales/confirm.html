<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a th:href="${from == 'staging' ? '/sales/staging' : '/sales/' + sale.id}" class="text-muted text-decoration-none small d-inline-block mb-3"
   th:text="${from == 'staging' ? '← Stager' : '← Sale'}"></a>

<div class="mb-4">
    <h4 class="mb-2" th:text="${sale.status == 'CONFIRMED' ? 'Edit Attached Items' : 'Confirm Sale'}"></h4>
    <div class="d-flex justify-content-between align-items-start gap-3">
        <div class="flex-grow-1 min-w-0">
            <div class="fw-medium" th:text="${sale.title}"></div>
            <small class="text-muted"><span th:replace="~{fragments/items :: date-color(date=${sale.saleDate})}"></span> · $<span th:text="${#numbers.formatDecimal(sale.grossAmount, 1, 2)}"></span></small>
        </div>
        <th:block th:replace="~{fragments/items :: sale-status-badge(sale=${sale})}"></th:block>
    </div>
</div>

<form method="POST" th:action="'/sales/' + ${sale.id} + '/confirm'">
    <input th:if="${from == 'staging'}" type="hidden" name="from" value="staging">
    <div th:if="${#lists.isEmpty(rawItems) and #lists.isEmpty(gradedItems)}" class="card mb-3">
        <div class="card-body text-muted">No items available in your inventory. You can still confirm this sale without attaching items.</div>
    </div>

    <div th:replace="~{fragments/items :: item-picker-table(items=${rawItems}, label='Raw Cards', checkboxName='item_ids', attachedIds=${attachedIds})}"></div>
    <div th:replace="~{fragments/items :: item-picker-table(items=${gradedItems}, label='Graded', checkboxName='item_ids', attachedIds=${attachedIds})}"></div>

    <div class="d-flex justify-content-between align-items-center">
        <a th:href="${from == 'staging' ? '/sales/staging' : '/sales/' + sale.id}" class="text-muted text-decoration-none small">Cancel</a>
        <button type="submit" class="btn btn-success" th:text="${sale.status == 'CONFIRMED' ? 'Save Items' : 'Confirm Sale'}"></button>
    </div>
</form>

</div>
</body>
</html>
