<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/sales" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Sales</a>

<div th:with="monthNum=${#temporals.month(sale.saleDate)},
     monthColor=${monthNum == 1 ? '#90caf9' : (monthNum == 2 ? '#f48fb1' : (monthNum == 3 ? '#a5d6a7' : (monthNum == 4 ? '#ce93d8' : (monthNum == 5 ? '#fff59d' : (monthNum == 6 ? '#ffcc80' : (monthNum == 7 ? '#ef9a9a' : (monthNum == 8 ? '#ffd54f' : (monthNum == 9 ? '#bcaaa4' : (monthNum == 10 ? '#ffab91' : (monthNum == 11 ? '#d7ccc8' : '#81c784'))))))))))}">
<div class="d-flex justify-content-between align-items-start mb-4">
    <div>
        <h4 class="mb-1" th:text="${sale.title}"></h4>
        <small class="text-muted">
            <span th:style="'color:' + ${monthColor}" th:text="${#temporals.format(sale.saleDate, 'MMM d, yyyy')}"></span>
            <span th:if="${sale.buyerUsername != null and !sale.buyerUsername.isEmpty()}" th:text="' · ' + ${sale.buyerUsername}"></span>
        </small>
    </div>
    <div class="d-flex align-items-center gap-3 flex-shrink-0">
        <small th:if="${sale.origin == 'EBAY' and sale.ebayOrderId != null and !sale.ebayOrderId.isEmpty()}">
            <a th:href="'https://www.ebay.com/sh/ord/details?orderid=' + ${sale.ebayOrderId}" target="_blank" rel="noopener" class="text-muted text-decoration-none">View on eBay ↗</a>
        </small>
        <div class="d-flex gap-2">
            <form th:if="${sale.status == 'CONFIRMED' or sale.status == 'IGNORED'}" method="POST" th:action="'/sales/' + ${sale.id} + '/unstage'" class="d-inline">
                <button type="submit" class="btn btn-outline-warning btn-sm" th:text="${sale.status == 'CONFIRMED' ? '&#8634; Unstage' : '&#8634; Restore'}"></button>
            </form>
            <form th:if="${sale.status == 'STAGED'}" method="POST" th:action="'/sales/' + ${sale.id} + '/ignore'" class="d-inline">
                <button type="submit" class="btn btn-outline-secondary btn-sm">&#8212; Ignore</button>
            </form>
            <a th:if="${sale.status == 'STAGED' or sale.status == 'CONFIRMED'}" th:href="'/sales/' + ${sale.id} + '/confirm'" class="btn btn-outline-secondary btn-sm">Edit</a>
            <form method="POST" th:action="'/sales/' + ${sale.id} + '/delete'" class="d-inline"
                  onsubmit="return confirm('Delete this sale? Attached items will return to inventory.')">
                <button type="submit" class="btn btn-outline-danger btn-sm">Delete</button>
            </form>
        </div>
    </div>
</div>
</div>

<div class="card mb-3">
    <div class="card-body">
        <div class="row text-center">
            <div class="col"><div class="text-muted small text-uppercase">Sold For</div><div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(sale.grossAmount, 1, 2)}"></div></div>
            <div class="col"><div class="text-muted small text-uppercase">Fees</div><div class="fw-semibold" th:text="'$' + ${#numbers.formatDecimal(sale.ebayFees, 1, 2)}"></div></div>
            <div class="col"><div class="text-muted small text-uppercase">Earnings</div><div class="fw-semibold text-success" th:text="'$' + ${#numbers.formatDecimal(sale.netAmount, 1, 2)}"></div></div>
            <div class="col"><div class="text-muted small text-uppercase">Status</div>
                <div>
                    <span th:if="${sale.attributedTo == 'vince'}" class="badge bg-info text-dark">Vince</span>
                    <span th:unless="${sale.attributedTo == 'vince'}" class="badge"
                          th:classappend="${sale.status == 'CONFIRMED' ? 'bg-success' : (sale.status == 'STAGED' ? 'bg-warning text-dark' : 'bg-secondary')}"
                          th:text="${sale.status == 'CONFIRMED' ? 'Confirmed' : (sale.status == 'STAGED' ? 'Staged' : 'Ignored')}"></span>
                </div>
            </div>
            <div class="col"><div class="text-muted small text-uppercase">Method of Sale</div>
                <div><span class="badge" th:classappend="${sale.origin == 'EBAY' ? 'bg-primary' : (sale.origin == 'FACEBOOK' ? 'bg-info' : 'bg-secondary')}" th:text="${sale.origin == 'EBAY' ? 'eBay' : (sale.origin == 'FACEBOOK' ? 'Facebook' : 'Other')}"></span></div>
            </div>
        </div>
    </div>
</div>

<div th:if="${sale.notes != null and !sale.notes.isEmpty()}" class="card mb-3">
    <div class="card-body py-2 px-3">
        <div class="text-muted" style="font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;font-weight:600">Notes</div>
        <div class="small" th:text="${sale.notes}"></div>
    </div>
</div>

<div class="mb-4">
    <span class="month-pill section-pill d-inline-block mb-2">Attached Items</span>
    <div th:if="${sale.items == null or sale.items.isEmpty()}" class="card">
        <div class="card-body text-center text-muted py-4">
            <span th:if="${sale.status == 'CONFIRMED'}">No items attached. <a th:href="'/sales/' + ${sale.id} + '/confirm'">Attach from inventory</a>.</span>
            <span th:if="${sale.status == 'STAGED'}">Confirm this sale to attach inventory items.</span>
            <span th:if="${sale.status != 'CONFIRMED' and sale.status != 'STAGED'}">No items attached.</span>
        </div>
    </div>
    <table th:if="${sale.items != null and !sale.items.isEmpty()}" class="table table-sm table-hover bg-white mb-0">
        <thead class="table-light">
        <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Type</th><th class="text-center text-nowrap ps-4">Cost Basis</th><th class="text-center text-nowrap ps-4">Market</th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${sale.items}">
            <td>
                <div th:replace="~{fragments/items :: item-cell(item=${item})}"></div>
            </td>
            <td class="text-center align-middle text-nowrap ps-4">
                <th:block th:replace="~{fragments/items :: type-badge(item=${item})}"></th:block>
            </td>
            <td class="text-center align-middle text-nowrap ps-4 fw-medium" th:text="'$' + ${#numbers.formatDecimal(item.costBasis, 1, 2)}"></td>
            <td class="text-center align-middle text-nowrap ps-4 text-muted" th:text="${item.pokemonCard != null and item.pokemonCard.marketPrice != 0 ? '$' + #numbers.formatDecimal(item.pokemonCard.marketPrice, 1, 2) : '—'}"></td>
        </tr>
        </tbody>
    </table>
</div>

</div>
</body>
</html>
