<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/sales" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Sales</a>
<h4 class="mb-4">New Sale</h4>

<form method="POST" action="/sales">
    <div class="card mb-3">
        <div class="card-body">
            <div class="row g-3">
                <div class="col-12">
                    <label class="form-label small text-muted mb-1">Title</label>
                    <input name="title" class="form-control form-control-sm" placeholder="e.g. Charizard VMAX Alt Art" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Sale Date</label>
                    <input name="saleDate" type="date" class="form-control form-control-sm" required>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Origin</label>
                    <select name="origin" class="form-select form-select-sm">
                        <option value="EBAY">eBay</option>
                        <option value="FACEBOOK">Facebook</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Buyer Username</label>
                    <input name="buyerUsername" class="form-control form-control-sm" placeholder="Optional">
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Order ID</label>
                    <input name="ebayOrderId" class="form-control form-control-sm" placeholder="Optional">
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Sold For</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input name="grossAmount" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" required>
                    </div>
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Fees</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input name="ebayFees" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" value="0">
                    </div>
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Shipping</label>
                    <div class="input-group input-group-sm">
                        <span class="input-group-text">$</span>
                        <input name="shippingCost" type="number" step="0.01" min="0" class="form-control" placeholder="0.00" value="0">
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="text-end">
        <button type="submit" class="btn btn-success btn-sm">Save Sale</button>
    </div>
</form>

</div>
</body>
</html>
