<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<body>
<div layout:fragment="content">

<a href="/sales" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Sales</a>
<div class="d-flex justify-content-between align-items-center mb-4">
    <div>
        <h4 class="mb-1">Sale Stager</h4>
        <small class="text-muted">Triage eBay orders. Confirm yours, send Vince's to him, ignore the rest.</small>
    </div>
    <span class="badge bg-warning text-dark fs-6" th:text="${#lists.size(sales)} + ' staged'"></span>
</div>

<div th:if="${#lists.isEmpty(sales)}" class="card">
    <div class="card-body text-center text-muted py-5">Nothing to triage. New eBay orders will land here automatically.</div>
</div>

<table th:unless="${#lists.isEmpty(sales)}" class="table table-hover bg-white">
    <thead class="table-light">
    <tr><th style="width:100%">Item</th><th class="text-center text-nowrap ps-4">Origin</th><th class="text-center text-nowrap ps-4">Amount</th><th class="text-center text-nowrap ps-4">Actions</th></tr>
    </thead>
    <tbody>
    <tr th:each="s : ${sales}">
        <td class="align-middle">
            <a th:href="'/sales/' + ${s.id}" class="sale-title text-body text-decoration-none fw-medium" th:title="${s.title}" th:text="${#strings.abbreviate(s.title, 45)}"></a>
            <div class="text-muted inv-subtext mt-1">
                <span th:replace="~{fragments/items :: date-color(date=${s.saleDate})}"></span>
                <span th:if="${s.buyerUsername != null and !s.buyerUsername.isEmpty()}" th:text="' · ' + ${s.buyerUsername}"></span>
                <span th:if="${s.origin == 'EBAY' and s.ebayOrderId != null and !s.ebayOrderId.isEmpty()}">
                    · <a th:href="'https://www.ebay.com/sh/ord/details?orderid=' + ${s.ebayOrderId}" target="_blank" rel="noopener" class="text-muted">eBay ↗</a>
                </span>
            </div>
        </td>
        <td class="text-center align-middle text-nowrap ps-4">
            <span th:replace="~{fragments/items :: origin-badge(origin=${s.origin})}"></span>
        </td>
        <td class="text-center align-middle text-nowrap ps-4">
            <div class="small text-muted editable-amount" th:data-sale-id="${s.id}" data-field="gross"
                 th:data-value="${s.grossAmount}" th:text="'Sold: $' + ${#numbers.formatDecimal(s.grossAmount, 1, 2)}"></div>
            <div class="fw-semibold text-success editable-amount" th:data-sale-id="${s.id}" data-field="net"
                 th:data-value="${s.netAmount}" th:text="'Net: $' + ${#numbers.formatDecimal(s.netAmount, 1, 2)}"></div>
        </td>
        <td class="align-middle ps-4" style="white-space:nowrap;width:1%">
            <div class="d-flex flex-column gap-1 align-items-stretch" style="min-width:80px">
                <a th:href="'/sales/' + ${s.id} + '/confirm?from=staging'" class="btn btn-success btn-sm">Confirm</a>
                <button type="button" class="btn btn-outline-info btn-sm w-100"
                        th:attr="hx-post='/sales/' + ${s.id} + '/vince'"
                        hx-target="closest tr" hx-swap="delete swap:150ms">&#8594; Vince</button>
                <button type="button" class="btn btn-outline-secondary btn-sm w-100"
                        th:attr="hx-post='/sales/' + ${s.id} + '/ignore'"
                        hx-target="closest tr" hx-swap="delete swap:150ms">&#8212; Ignore</button>
            </div>
        </td>
    </tr>
    </tbody>
</table>

<style>
.editable-amount { cursor: default; border-bottom: 1px dashed transparent; }
.editable-amount:hover { border-bottom-color: #6c757d; }
.editable-amount input {
    width: 5rem; text-align: center; font-size: inherit; padding: 0 .25rem;
    border: 1px solid #0d6efd; border-radius: .25rem; outline: none;
}
</style>

<script>
document.querySelectorAll('.editable-amount').forEach(function(el) {
    el.addEventListener('dblclick', function() {
        if (el.querySelector('input')) return;
        var value = el.dataset.value;
        var label = el.dataset.field === 'gross' ? 'Sold' : 'Net';
        var input = document.createElement('input');
        input.type = 'number';
        input.step = '0.01';
        input.value = parseFloat(value).toFixed(2);
        el.textContent = label + ': $';
        el.appendChild(input);
        input.focus();
        input.select();

        function commit() {
            var newValue = parseFloat(input.value);
            if (isNaN(newValue)) {
                revert();
                return;
            }
            el.dataset.value = newValue.toFixed(2);
            el.textContent = label + ': $' + newValue.toFixed(2);

            var saleId = el.dataset.saleId;
            var row = el.closest('td');
            var grossEl = row.querySelector('[data-field="gross"]');
            var netEl = row.querySelector('[data-field="net"]');

            fetch('/sales/' + saleId + '/amounts?grossAmount=' + grossEl.dataset.value + '&netAmount=' + netEl.dataset.value, {
                method: 'PATCH'
            });
        }

        function revert() {
            var label = el.dataset.field === 'gross' ? 'Sold' : 'Net';
            el.textContent = label + ': $' + parseFloat(el.dataset.value).toFixed(2);
        }

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') { e.preventDefault(); commit(); }
            if (e.key === 'Escape') { e.preventDefault(); revert(); }
        });
        input.addEventListener('blur', commit);
    });
});
</script>

</div>

</body>
</html>
