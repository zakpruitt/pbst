{{define "content"}}
<a href="/inventory" class="text-muted text-decoration-none small d-inline-block mb-3">&larr; Inventory</a>
<h4 class="mb-4">Add Item</h4>

<form method="POST" action="/inventory" x-data="{type: 'OTHER'}">
    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title mb-3">Item</h6>
            <div class="row g-2">
                <div class="col-sm-8">
                    <label class="form-label small text-muted mb-1">Name</label>
                    <input name="name" class="form-control form-control-sm" required
                           placeholder="e.g. Charizard Statue">
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Type</label>
                    <select name="item_type" class="form-select form-select-sm" x-model="type" required>
                        <option value="OTHER">Other</option>
                        <option value="RAW_CARD">Raw Card</option>
                        <option value="GRADED_CARD">Graded Card</option>
                        <option value="SEALED_PRODUCT">Sealed Product</option>
                    </select>
                </div>
            </div>

            <div class="row g-2 mt-0" x-show="type === 'GRADED_CARD'" x-cloak>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Grading Company</label>
                    <select name="grading_company" class="form-select form-select-sm">
                        <option value="PSA">PSA</option>
                        <option value="BGS">BGS</option>
                        <option value="CGC">CGC</option>
                        <option value="TAG">TAG</option>
                    </select>
                </div>
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Grade</label>
                    <input name="grade" class="form-control form-control-sm" placeholder="e.g. 10">
                </div>
            </div>

            <div class="row g-2 mt-0">
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Cost Basis ($)</label>
                    <input name="cost_basis" type="number" step="0.01" min="0" class="form-control form-control-sm"
                           value="0">
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Market Value ($)</label>
                    <input name="market_value" type="number" step="0.01" min="0" class="form-control form-control-sm"
                           placeholder="Optional">
                </div>
                <div class="col-sm-4">
                    <label class="form-label small text-muted mb-1">Acquisition Date</label>
                    <input name="acquisition_date" type="date" class="form-control form-control-sm">
                </div>
            </div>

            <div class="row g-2 mt-0">
                <div class="col-sm-6">
                    <label class="form-label small text-muted mb-1">Purpose</label>
                    <select name="purpose" class="form-select form-select-sm">
                        <option value="INVENTORY">Inventory</option>
                        <option value="PERSONAL_COLLECTION">Personal Collection</option>
                    </select>
                </div>
            </div>

            <div class="mt-2">
                <label class="form-label small text-muted mb-1">Notes</label>
                <textarea name="notes" class="form-control form-control-sm" rows="2" placeholder="Optional"></textarea>
            </div>
        </div>
    </div>

    <div class="d-flex justify-content-end">
        <button type="submit" class="btn btn-success">Save</button>
    </div>
</form>
{{end}}
