{{define "layout"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>collectingwithzak</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="/static/css/app.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-light">

  <nav class="navbar navbar-expand-lg bg-white mb-4 py-2">
    <div class="container">
      <a class="navbar-brand fw-bold text-success" href="/">collectingwithzak</a>
      <div class="navbar-nav flex-row gap-3 ms-auto align-items-center">
        <a class="nav-link {{if eq .Page "dashboard"}}active-page{{end}}" href="/">Dashboard</a>
        <a class="nav-link {{if eq .Page "lots"}}active-page{{end}}" href="/lots">Lots</a>
        <a class="nav-link {{if eq .Page "sales"}}active-page{{end}}" href="/sales">Sales</a>
        <a class="nav-link {{if eq .Page "inventory"}}active-page{{end}}" href="/inventory">Inventory</a>
        <a class="nav-link {{if eq .Page "grading"}}active-page{{end}}" href="/grading">Grading</a>
        <a class="nav-link {{if eq .Page "expenses"}}active-page{{end}}" href="/expenses">Expenses</a>
        <button class="btn btn-sm btn-outline-secondary"
          hx-post="/api/v1/logout"
          hx-on::after-request="if(event.detail.successful) window.location='/login.html'">
          Logout
        </button>
      </div>
    </div>
  </nav>

  <main class="container pb-4">
    {{template "content" .}}
  </main>

  <footer class="border-top bg-white mt-auto py-3">
    <div class="container d-flex flex-wrap justify-content-between align-items-center gap-2">
      <span class="text-muted small">&copy; {{currentYear}} collectingwithzak. All rights reserved.</span>
      <span class="text-muted small">Personal use only &mdash; not affiliated with The Pok&eacute;mon Company.</span>
    </div>
  </footer>

  <!-- Floating card image preview -->
  <div id="cp"><img src="" alt=""></div>

  <script src="/static/js/app.js"></script>

</body>
</html>
{{end}}
