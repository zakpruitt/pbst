{{define "content"}}
<a href="/lots/{{.Lot.ID}}" class="text-muted text-decoration-none small d-inline-block mb-3">← {{.Lot.SellerName}}</a>
<h4 class="mb-4">Edit Lot</h4>

<form id="lot-form" method="POST" action="/lots/{{.Lot.ID}}">
  <input type="hidden" id="snapshot-input" name="lot_content_snapshot" value="[]">
  <input type="hidden" id="total-cost-input" name="total_cost" value="0">
  <input type="hidden" id="emv-input" name="estimated_market_value" value="0">

  <div class="card mb-3">
    <div class="card-body">
      <h6 class="card-title mb-3">Lot Details</h6>
      <div class="row g-2">
        <div class="col-12">
          <input name="seller_name" class="form-control form-control-sm" value="{{.Lot.SellerName}}" required>
        </div>
        <div class="col-sm-6">
          <input name="purchase_date" type="date" class="form-control form-control-sm"
            value="{{.Lot.PurchaseDate | fmtDate}}" required>
        </div>
        <div class="col-sm-6">
          <input name="description" class="form-control form-control-sm"
            value="{{.Lot.Description}}" placeholder="Notes (optional)">
        </div>
      </div>
    </div>
  </div>

  <div class="card mb-3">
    <div class="card-body">
      <h6 class="card-title mb-3">Add Items</h6>
      <div class="position-relative mb-2">
        <input id="card-search" type="text" class="form-control form-control-sm"
          placeholder="Search cards by name or set…" autocomplete="off">
        <div id="search-results"
          class="position-absolute w-100 bg-white border rounded-3 shadow mt-1 d-none"
          style="z-index:100;max-height:280px;overflow-y:auto"></div>
      </div>
      <button type="button" onclick="addManualRow()" class="btn btn-sm btn-outline-secondary">
        + Add row manually
      </button>
    </div>
  </div>

  <div id="items-list"></div>
  <div id="empty-msg" class="text-center text-muted py-4 small card mb-3" style="display:none">No items.</div>

  <div class="d-flex justify-content-between align-items-center">
    <span class="text-muted small">Total offered: <strong id="total-display">$0.00</strong></span>
    <button type="submit" class="btn btn-success">Save Changes</button>
  </div>
</form>

<script>
(function () {
  const initialSnapshot = {{.SnapshotJSON}};
  const searchInput = document.getElementById('card-search');
  const searchResults = document.getElementById('search-results');
  const list = document.getElementById('items-list');
  const emptyMsg = document.getElementById('empty-msg');
  let debounce;

  initialSnapshot.forEach(item => list.appendChild(buildRow(item)));
  recalcTotal();

  searchInput.addEventListener('input', () => {
    clearTimeout(debounce);
    const q = searchInput.value.trim();
    if (!q) { hide(); return; }
    debounce = setTimeout(async () => {
      const res = await fetch('/api/v1/cards/search?q=' + encodeURIComponent(q));
      const cards = await res.json();
      searchResults.innerHTML = (!cards || !cards.length)
        ? '<p class="px-3 py-2 small text-muted mb-0">No cards found.</p>'
        : cards.map(c => `<button type="button"
            class="search-result-btn d-flex align-items-center gap-2 w-100 text-start px-3 py-2 border-0 bg-transparent"
            data-id="${x(c.id)}" data-name="${x(c.name)}" data-set="${x(c.set_name)}"
            data-card="${x(c.card_number)}" data-rarity="${x(c.rarity)}" data-market="${c.market_price||0}"
            data-img="${x(c.image_url||'')}" onclick="pickCard(this)">
            ${c.image_url ? `<img src="${x(c.image_url)}" style="height:52px;width:auto;border-radius:4px;flex-shrink:0">` : '<div style="width:36px"></div>'}
            <span>
              <strong class="d-block">${x(c.name)}</strong>
              <span class="text-muted small">${x(c.set_name)} #${x(c.card_number)} · ${x(c.rarity)}</span><br>
              <span class="text-success small">${c.market_price ? '$'+c.market_price.toFixed(2) : ''}</span>
            </span>
          </button>`).join('');
      searchResults.classList.remove('d-none');
    }, 300);
  });

  document.addEventListener('click', e => {
    if (!searchResults.contains(e.target) && e.target !== searchInput) hide();
  });

  function hide() { searchResults.innerHTML = ''; searchResults.classList.add('d-none'); }

  window.pickCard = function(btn) {
    hide(); searchInput.value = '';
    append({ pokemon_card_id: btn.dataset.id, name: btn.dataset.name, set_name: btn.dataset.set,
             card_number: btn.dataset.card, rarity: btn.dataset.rarity,
             market_price: parseFloat(btn.dataset.market) || 0, item_type: 'RAW_CARD',
             image_url: btn.dataset.img });
  };

  window.addManualRow = function() { append({ name: '', item_type: 'RAW_CARD', market_price: 0 }); };

  function append(data) {
    emptyMsg.style.display = 'none';
    list.appendChild(buildRow(data));
    recalcTotal();
  }

  function buildRow(data) {
    const el = document.createElement('div');
    el.className = 'item-row card card-body p-3 mb-2';
    const isGraded = data.item_type === 'GRADED_CARD';
    const isSealed = data.item_type === 'SEALED_PRODUCT';
    const isTracked = !!data.is_tracked;
    const purpose = data.purpose || '';
    const thumb = data.image_url
      ? `<img src="${x(data.image_url)}" class="card-thumb" data-card-img="${x(data.image_url)}" style="flex-shrink:0">`
      : '';

    el.innerHTML = `
      <input type="hidden" class="ri" value="${x(data.pokemon_card_id||'')}">
      <input type="hidden" class="rs" value="${x(data.set_name||'')}">
      <input type="hidden" class="rc" value="${x(data.card_number||'')}">
      <input type="hidden" class="rr" value="${x(data.rarity||'')}">
      <input type="hidden" class="rimg" value="${x(data.image_url||'')}">

      <div class="d-flex align-items-center gap-2 mb-2">
        ${thumb}
        <input class="form-control form-control-sm rn" value="${x(data.name||'')}" placeholder="Item name" style="min-width:0">
        ${(data.set_name||data.card_number) ? `<span class="text-muted small text-nowrap d-none d-md-inline">${x(data.set_name||'')}${data.card_number?' #'+x(data.card_number):''}${data.rarity?' · '+x(data.rarity):''}</span>` : ''}
        <button type="button" onclick="removeRow(this)" class="btn btn-sm btn-outline-danger px-2 py-0 ms-auto" style="flex-shrink:0">✕</button>
      </div>

      <div class="d-flex flex-wrap gap-2 align-items-center">
        <div class="d-flex align-items-center gap-1">
          <span class="text-muted small text-nowrap">Qty</span>
          <input type="number" class="form-control form-control-sm rq text-end" style="width:58px" value="${data.qty||1}" min="1" oninput="recalcRow(this)">
        </div>
        <div class="d-flex align-items-center gap-1">
          <span class="text-muted small text-nowrap">Market</span>
          <input type="number" class="form-control form-control-sm rm text-end" style="width:82px" step="0.01" value="${(data.market_price||0).toFixed(2)}" oninput="recalcRow(this)">
        </div>
        <div class="d-flex align-items-center gap-1">
          <span class="text-muted small">%</span>
          <input type="number" class="form-control form-control-sm rp text-end" style="width:58px" value="${data.percentage||70}" min="0" max="100" oninput="recalcRow(this)">
        </div>
        <div class="d-flex align-items-center gap-1 text-nowrap">
          <span class="text-muted small">→</span>
          <strong class="text-success ro small">$0.00</strong>
        </div>
        <select class="form-select form-select-sm rt" style="width:128px" onchange="toggleGraded(this)">
          <option value="RAW_CARD" ${!isGraded&&!isSealed?'selected':''}>Raw Card</option>
          <option value="GRADED_CARD" ${isGraded?'selected':''}>Graded Card</option>
          <option value="SEALED_PRODUCT" ${isSealed?'selected':''}>Sealed</option>
        </select>
        <div class="d-flex align-items-center gap-1">
          <input type="checkbox" class="form-check-input rk" onchange="togglePurpose(this)" ${isTracked?'checked':''}>
          <span class="text-muted small text-nowrap">Track</span>
        </div>
        <select class="form-select form-select-sm rpv" style="width:155px;${isTracked?'':'display:none'}">
          <option value="PERSONAL_COLLECTION" ${purpose==='PERSONAL_COLLECTION'?'selected':''}>Collection</option>
          <option value="PENDING_GRADE" ${purpose==='PENDING_GRADE'?'selected':''}>To Grade</option>
          <option value="GRADED_INVENTORY" ${purpose==='GRADED_INVENTORY'?'selected':''}>Graded Inventory</option>
        </select>
      </div>

      <div class="rgd d-flex gap-2 mt-2 align-items-center" style="${isGraded?'':'display:none'}">
        <span class="text-muted small text-nowrap">Company</span>
        <select class="form-select form-select-sm rgc" style="width:90px">
          <option value="PSA" ${data.grading_company==='PSA'?'selected':''}>PSA</option>
          <option value="BGS" ${data.grading_company==='BGS'?'selected':''}>BGS</option>
          <option value="CGC" ${data.grading_company==='CGC'?'selected':''}>CGC</option>
          <option value="TAG" ${data.grading_company==='TAG'?'selected':''}>TAG</option>
        </select>
        <span class="text-muted small text-nowrap">Grade</span>
        <input type="text" class="form-control form-control-sm rgg" style="width:70px" placeholder="e.g. 9" value="${x(data.grade||'')}">
      </div>`;

    recalcEl(el);
    return el;
  }

  window.toggleGraded = function(sel) {
    const row = sel.closest('.item-row');
    const isGraded = sel.value === 'GRADED_CARD';
    row.querySelector('.rgd').style.display = isGraded ? '' : 'none';
    const rpv = row.querySelector('.rpv');
    if (isGraded && row.querySelector('.rk').checked) {
      rpv.value = 'GRADED_INVENTORY';
    } else if (!isGraded && rpv.value === 'GRADED_INVENTORY') {
      rpv.value = 'PERSONAL_COLLECTION';
    }
  };

  window.recalcRow = function(el) { recalcEl(el.closest('.item-row')); recalcTotal(); };

  window.togglePurpose = function(cb) {
    const row = cb.closest('.item-row');
    const rpv = row.querySelector('.rpv');
    rpv.style.display = cb.checked ? '' : 'none';
    if (cb.checked && row.querySelector('.rt').value === 'GRADED_CARD') {
      rpv.value = 'GRADED_INVENTORY';
    }
  };

  window.removeRow = function(btn) {
    btn.closest('.item-row').remove();
    if (!list.children.length) emptyMsg.style.display = '';
    recalcTotal();
  };

  function recalcEl(row) {
    const offered = (parseFloat(row.querySelector('.rm').value)||0)
      * (parseInt(row.querySelector('.rq').value)||1)
      * ((parseFloat(row.querySelector('.rp').value)||0) / 100);
    row.querySelector('.ro').textContent = '$' + offered.toFixed(2);
  }

  function recalcTotal() {
    let t = 0;
    document.querySelectorAll('.ro').forEach(el => t += parseFloat(el.textContent.replace('$',''))||0);
    document.getElementById('total-display').textContent = '$' + t.toFixed(2);
  }

  document.getElementById('lot-form').addEventListener('submit', () => {
    const rows = []; let cost = 0, emv = 0;
    list.querySelectorAll('.item-row').forEach(row => {
      const qty = parseInt(row.querySelector('.rq').value)||1;
      const mkt = parseFloat(row.querySelector('.rm').value)||0;
      const pct = parseFloat(row.querySelector('.rp').value)||0;
      const off = mkt * qty * pct / 100;
      const trk = row.querySelector('.rk').checked;
      cost += off; emv += mkt * qty;
      rows.push({
        name:            row.querySelector('.rn').value,
        pokemon_card_id: row.querySelector('.ri').value,
        set_name:        row.querySelector('.rs').value,
        card_number:     row.querySelector('.rc').value,
        rarity:          row.querySelector('.rr').value,
        image_url:       row.querySelector('.rimg').value,
        qty, market_price: mkt, percentage: pct, offered: off,
        item_type:       row.querySelector('.rt').value,
        is_tracked:      trk,
        purpose:         trk ? row.querySelector('.rpv').value : '',
        grading_company: row.querySelector('.rgc')?.value || '',
        grade:           row.querySelector('.rgg')?.value || '',
      });
    });
    document.getElementById('snapshot-input').value   = JSON.stringify(rows);
    document.getElementById('total-cost-input').value = cost.toFixed(2);
    document.getElementById('emv-input').value        = emv.toFixed(2);
  });

  function x(s) { return String(s??'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
})();
</script>
{{end}}
