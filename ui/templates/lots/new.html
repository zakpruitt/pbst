{{define "content"}}
<a href="/lots" class="text-muted text-decoration-none small d-inline-block mb-3">← Lots</a>
<h4 class="mb-4">New Lot</h4>

<form id="lot-form" method="POST" action="/lots">
    {{/* Hidden fields populated on submit by serializeSnapshot() */}}
    <input type="hidden" id="snapshot-input" name="lot_content_snapshot" value="[]">
    <input type="hidden" id="total-cost-input" name="total_cost" value="0">
    <input type="hidden" id="emv-input" name="estimated_market_value" value="0">

    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title mb-3">Lot Details</h6>
            <div class="row g-2">
                <div class="col-12">
                    <input name="seller_name" class="form-control form-control-sm" placeholder="Seller name" required>
                </div>
                <div class="col-sm-6">
                    <input name="purchase_date" type="date" class="form-control form-control-sm" required>
                </div>
                <div class="col-sm-6">
                    <input name="description" class="form-control form-control-sm" placeholder="Notes (optional)">
                </div>
            </div>
        </div>
    </div>

    <div class="card mb-3">
        <div class="card-body">
            <h6 class="card-title mb-3">Add Items</h6>
            <div class="position-relative mb-2">
                <input id="card-search" type="text" class="form-control form-control-sm"
                       placeholder="Search cards by name or set…" autocomplete="off">
                <div id="search-results"
                     class="position-absolute w-100 bg-white border rounded-3 shadow mt-1 d-none"
                     style="z-index:100;max-height:280px;overflow-y:auto"></div>
            </div>
            <button type="button" onclick="addManualRow()" class="btn btn-sm btn-outline-secondary">
                + Add row manually
            </button>
        </div>
    </div>

    <div id="items-list"></div>

    <div id="empty-msg" class="text-center text-muted py-4 small card mb-3">
        Search for a card above or add a row manually.
    </div>

    <div class="d-flex justify-content-between align-items-center">
        <span class="text-muted small">Total offered: <strong id="total-display">$0.00</strong></span>
        <button type="submit" class="btn btn-success">Save Lot</button>
    </div>
</form>

<script>
(function () {
    // ── DOM refs ──────────────────────────────────────────────────────────────
    const searchInput   = document.getElementById('card-search');
    const searchResults = document.getElementById('search-results');
    const itemsList     = document.getElementById('items-list');
    const emptyMsg      = document.getElementById('empty-msg');
    let debounceTimer;

    // ── Card search ───────────────────────────────────────────────────────────
    searchInput.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        const q = searchInput.value.trim();
        if (!q) { hideSearch(); return; }

        debounceTimer = setTimeout(async () => {
            const res   = await fetch('/api/v1/cards/search?q=' + encodeURIComponent(q));
            const cards = await res.json();

            searchResults.innerHTML = (!cards || !cards.length)
                ? '<p class="px-3 py-2 small text-muted mb-0">No cards found.</p>'
                : cards.map(c => `
                    <button type="button"
                        class="search-result-btn d-flex align-items-center gap-2 w-100 text-start px-3 py-2 border-0 bg-transparent"
                        data-id="${esc(c.id)}" data-name="${esc(c.name)}" data-set="${esc(c.set_name)}"
                        data-card="${esc(c.card_number)}" data-rarity="${esc(c.rarity)}"
                        data-market="${c.market_price || 0}" data-img="${esc(c.image_url || '')}"
                        onclick="pickCard(this)">
                        ${c.image_url
                            ? `<img src="${esc(c.image_url)}" style="height:52px;width:auto;border-radius:4px;flex-shrink:0">`
                            : '<div style="width:36px"></div>'}
                        <span>
                            <strong class="d-block">${esc(c.name)}</strong>
                            <span class="text-muted small">${esc(c.set_name)} #${esc(c.card_number)} · ${esc(c.rarity)}</span><br>
                            <span class="text-success small">${c.market_price ? '$' + c.market_price.toFixed(2) : ''}</span>
                        </span>
                    </button>`).join('');

            searchResults.classList.remove('d-none');
        }, 300);
    });

    document.addEventListener('click', e => {
        if (!searchResults.contains(e.target) && e.target !== searchInput) hideSearch();
    });

    function hideSearch() {
        searchResults.innerHTML = '';
        searchResults.classList.add('d-none');
    }

    // ── Row management ────────────────────────────────────────────────────────
    window.pickCard = function (btn) {
        hideSearch();
        searchInput.value = '';
        appendRow({
            pokemon_card_id: btn.dataset.id,
            name:            btn.dataset.name,
            set_name:        btn.dataset.set,
            card_number:     btn.dataset.card,
            rarity:          btn.dataset.rarity,
            market_price:    parseFloat(btn.dataset.market) || 0,
            item_type:       'RAW_CARD',
            image_url:       btn.dataset.img,
        });
    };

    window.addManualRow = function () {
        appendRow({ name: '', item_type: 'RAW_CARD', market_price: 0 });
    };

    function appendRow(data) {
        emptyMsg.style.display = 'none';
        itemsList.appendChild(buildRow(data));
        recalcTotal();
    }

    function buildRow(data) {
        const el        = document.createElement('div');
        el.className    = 'item-row card card-body p-3 mb-2';
        const isGraded  = data.item_type === 'GRADED_CARD';
        const isSealed  = data.item_type === 'SEALED_PRODUCT';
        const isTracked = !!data.is_tracked;
        const purpose   = data.purpose || '';

        const thumbHtml = data.image_url
            ? `<img src="${esc(data.image_url)}" class="card-thumb" data-card-img="${esc(data.image_url)}" style="flex-shrink:0">`
            : '';

        const setInfoHtml = (data.set_name || data.card_number)
            ? `<span class="text-muted small text-nowrap d-none d-md-inline">
                   ${esc(data.set_name || '')}${data.card_number ? ' #' + esc(data.card_number) : ''}${data.rarity ? ' · ' + esc(data.rarity) : ''}
               </span>`
            : '';

        el.innerHTML = `
            {{/* Hidden fields captured on submit */}}
            <input type="hidden" class="row-card-id"     value="${esc(data.pokemon_card_id || '')}">
            <input type="hidden" class="row-set-name"    value="${esc(data.set_name || '')}">
            <input type="hidden" class="row-card-number" value="${esc(data.card_number || '')}">
            <input type="hidden" class="row-rarity"      value="${esc(data.rarity || '')}">
            <input type="hidden" class="row-image-url"   value="${esc(data.image_url || '')}">

            {{/* Row header: thumbnail + name + remove */}}
            <div class="d-flex align-items-center gap-2 mb-2">
                ${thumbHtml}
                <input class="form-control form-control-sm row-name"
                       value="${esc(data.name || '')}" placeholder="Item name" style="min-width:0">
                ${setInfoHtml}
                <button type="button" onclick="removeRow(this)"
                        class="btn btn-sm btn-outline-danger px-2 py-0 ms-auto" style="flex-shrink:0">✕</button>
            </div>

            {{/* Pricing + type controls */}}
            <div class="d-flex flex-wrap gap-2 align-items-center">
                <div class="d-flex align-items-center gap-1">
                    <span class="text-muted small text-nowrap">Qty</span>
                    <input type="number" class="form-control form-control-sm row-qty text-end"
                           style="width:58px" value="${data.qty || 1}" min="1" oninput="recalcRow(this)">
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="text-muted small text-nowrap">Market</span>
                    <input type="number" class="form-control form-control-sm row-market text-end"
                           style="width:82px" step="0.01" value="${(data.market_price || 0).toFixed(2)}" oninput="recalcRow(this)">
                </div>
                <div class="d-flex align-items-center gap-1">
                    <span class="text-muted small">%</span>
                    <input type="number" class="form-control form-control-sm row-pct text-end"
                           style="width:58px" value="${data.percentage || 70}" min="0" max="100" oninput="recalcRow(this)">
                </div>
                <div class="d-flex align-items-center gap-1 text-nowrap">
                    <span class="text-muted small">→</span>
                    <strong class="text-success row-offered small">$0.00</strong>
                </div>
                <select class="form-select form-select-sm row-type" style="width:128px" onchange="toggleGraded(this)">
                    <option value="RAW_CARD"       ${!isGraded && !isSealed ? 'selected' : ''}>Raw Card</option>
                    <option value="GRADED_CARD"    ${isGraded ? 'selected' : ''}>Graded Card</option>
                    <option value="SEALED_PRODUCT" ${isSealed ? 'selected' : ''}>Sealed</option>
                </select>
                <div class="d-flex align-items-center gap-1">
                    <input type="checkbox" class="form-check-input row-track"
                           onchange="togglePurpose(this)" ${isTracked ? 'checked' : ''}>
                    <span class="text-muted small text-nowrap">Track</span>
                </div>
                <select class="form-select form-select-sm row-purpose" style="width:155px;${isTracked ? '' : 'display:none'}">
                    <option value="PERSONAL_COLLECTION" ${purpose === 'PERSONAL_COLLECTION' ? 'selected' : ''}>Collection</option>
                    <option value="IN_GRADING"          ${purpose === 'IN_GRADING'          ? 'selected' : ''}>In Grading</option>
                    <option value="GRADED_INVENTORY"    ${purpose === 'GRADED_INVENTORY'    ? 'selected' : ''}>Graded Inventory</option>
                </select>
            </div>

            {{/* Graded card extra fields (shown only when type = GRADED_CARD) */}}
            <div class="row-graded-fields d-flex gap-2 mt-2 align-items-center" style="${isGraded ? '' : 'display:none'}">
                <span class="text-muted small text-nowrap">Company</span>
                <select class="form-select form-select-sm row-grading-company" style="width:90px">
                    <option value="PSA" ${data.grading_company === 'PSA' ? 'selected' : ''}>PSA</option>
                    <option value="BGS" ${data.grading_company === 'BGS' ? 'selected' : ''}>BGS</option>
                    <option value="CGC" ${data.grading_company === 'CGC' ? 'selected' : ''}>CGC</option>
                    <option value="TAG" ${data.grading_company === 'TAG' ? 'selected' : ''}>TAG</option>
                </select>
                <span class="text-muted small text-nowrap">Grade</span>
                <input type="text" class="form-control form-control-sm row-grade"
                       style="width:70px" placeholder="e.g. 9" value="${esc(data.grade || '')}">
            </div>`;

        recalcOffered(el);
        return el;
    }

    // ── Row event handlers ────────────────────────────────────────────────────
    window.toggleGraded = function (sel) {
        const row      = sel.closest('.item-row');
        const isGraded = sel.value === 'GRADED_CARD';
        const purpose  = row.querySelector('.row-purpose');

        row.querySelector('.row-graded-fields').style.display = isGraded ? '' : 'none';

        if (isGraded && row.querySelector('.row-track').checked) {
            purpose.value = 'GRADED_INVENTORY';
        } else if (!isGraded && purpose.value === 'GRADED_INVENTORY') {
            purpose.value = 'PERSONAL_COLLECTION';
        }
    };

    window.togglePurpose = function (cb) {
        const row     = cb.closest('.item-row');
        const purpose = row.querySelector('.row-purpose');
        purpose.style.display = cb.checked ? '' : 'none';
        if (cb.checked && row.querySelector('.row-type').value === 'GRADED_CARD') {
            purpose.value = 'GRADED_INVENTORY';
        }
    };

    window.removeRow = function (btn) {
        btn.closest('.item-row').remove();
        if (!itemsList.children.length) emptyMsg.style.display = '';
        recalcTotal();
    };

    window.recalcRow = function (el) {
        recalcOffered(el.closest('.item-row'));
        recalcTotal();
    };

    // ── Calculations ──────────────────────────────────────────────────────────
    function recalcOffered(row) {
        const market  = parseFloat(row.querySelector('.row-market').value) || 0;
        const qty     = parseInt(row.querySelector('.row-qty').value)      || 1;
        const pct     = parseFloat(row.querySelector('.row-pct').value)    || 0;
        const offered = market * qty * (pct / 100);
        row.querySelector('.row-offered').textContent = '$' + offered.toFixed(2);
    }

    function recalcTotal() {
        let total = 0;
        document.querySelectorAll('.row-offered').forEach(el => {
            total += parseFloat(el.textContent.replace('$', '')) || 0;
        });
        document.getElementById('total-display').textContent = '$' + total.toFixed(2);
    }

    // ── Submit: serialize rows into snapshot JSON ─────────────────────────────
    document.getElementById('lot-form').addEventListener('submit', () => {
        const rows = [];
        let totalCost = 0, totalEmv = 0;

        itemsList.querySelectorAll('.item-row').forEach(row => {
            const qty     = parseInt(row.querySelector('.row-qty').value)      || 1;
            const market  = parseFloat(row.querySelector('.row-market').value) || 0;
            const pct     = parseFloat(row.querySelector('.row-pct').value)    || 0;
            const offered = market * qty * pct / 100;
            const tracked = row.querySelector('.row-track').checked;

            totalCost += offered;
            totalEmv  += market * qty;

            rows.push({
                name:            row.querySelector('.row-name').value,
                pokemon_card_id: row.querySelector('.row-card-id').value,
                set_name:        row.querySelector('.row-set-name').value,
                card_number:     row.querySelector('.row-card-number').value,
                rarity:          row.querySelector('.row-rarity').value,
                image_url:       row.querySelector('.row-image-url').value,
                qty,
                market_price:    market,
                percentage:      pct,
                offered:         offered,
                item_type:       row.querySelector('.row-type').value,
                is_tracked:      tracked,
                purpose:         tracked ? row.querySelector('.row-purpose').value : '',
                grading_company: row.querySelector('.row-grading-company')?.value || '',
                grade:           row.querySelector('.row-grade')?.value || '',
            });
        });

        document.getElementById('snapshot-input').value   = JSON.stringify(rows);
        document.getElementById('total-cost-input').value = totalCost.toFixed(2);
        document.getElementById('emv-input').value        = totalEmv.toFixed(2);
    });

    // ── Utility ───────────────────────────────────────────────────────────────
    function esc(s) {
        return String(s ?? '')
            .replace(/&/g, '&amp;')
            .replace(/"/g, '&quot;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;');
    }
})();
</script>
{{end}}
