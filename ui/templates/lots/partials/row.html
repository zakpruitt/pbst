{{define "lot-row"}}
<div class="item-row card mb-2"
     x-data="{
       name: '{{js .Name}}',
       qty: {{if .Qty}}{{.Qty}}{{else}}1{{end}},
       market: {{printf "%.2f" .MarketPrice}},
       pct: {{if .Percentage}}{{printf "%.0f" .Percentage}}{{else}}60{{end}},
       type: '{{.ItemType}}',
       tracked: {{.IsTracked}},
       gradingCompany: '{{.GradingCompany}}',
       grade: '{{js .Grade}}',
       cardId: '{{.PokemonCardID}}',
       imageUrl: '{{js .ImageURL}}',
       setName: '{{js .SetName}}',
       cardNumber: '{{js .CardNumber}}',
       rarity: '{{js .Rarity}}',
       get offered(){ return (this.qty * this.market * this.pct / 100).toFixed(2) },
       get isGraded(){ return this.type === 'GRADED_CARD' },
       get borderColor(){
         if(this.type==='GRADED_CARD') return '#f0b429';
         if(this.type==='SEALED_PRODUCT') return '#0d6efd';
         return 'transparent';
       }
     }"
     :style="'border-left:3px solid '+borderColor">

    <div class="lot-row-grid p-2">

        <template x-if="imageUrl">
            <div class="lot-row-img">
                <img :src="imageUrl" :data-card-img="imageUrl">
            </div>
        </template>

        <div class="d-flex gap-2 align-items-center">
            <input class="form-control form-control-sm flex-grow-1"
                   x-model="name" placeholder="Name" style="min-width:0">
            <select class="form-select form-select-sm" style="width:120px;flex-shrink:0"
                    x-model="type">
                <option value="RAW_CARD">Raw Card</option>
                <option value="GRADED_CARD">Graded Card</option>
                <option value="SEALED_PRODUCT">Sealed</option>
            </select>
            <button type="button" class="btn btn-sm btn-outline-danger px-2 py-0"
                    style="flex-shrink:0;line-height:1.6"
                    @click="$el.closest('.item-row').remove(); $dispatch('lot:changed')">✕</button>
        </div>

        <div class="d-flex gap-2 align-items-center">
            <div class="d-flex gap-2 align-items-center" x-show="isGraded" x-cloak>
                <span class="text-muted small text-nowrap">Company</span>
                <select class="form-select form-select-sm" style="width:85px"
                        x-model="gradingCompany">
                    <option value="PSA">PSA</option>
                    <option value="BGS">BGS</option>
                    <option value="CGC">CGC</option>
                    <option value="TAG">TAG</option>
                </select>
                <span class="text-muted small text-nowrap">Grade</span>
                <input type="text" class="form-control form-control-sm"
                       style="width:60px" placeholder="e.g. 9" x-model="grade">
            </div>
            {{if or .SetName .CardNumber}}
            <span class="text-muted" style="font-size:.72rem">
                {{.SetName}}{{if .CardNumber}} #{{.CardNumber}}{{end}}
            </span>
            {{end}}
            <label class="d-flex align-items-center gap-1 text-muted small mb-0 ms-auto"
                   style="flex-shrink:0;white-space:nowrap">
                <input type="checkbox" class="form-check-input mt-0" x-model="tracked"> Track
            </label>
        </div>

        <div class="d-flex align-items-center gap-2" style="font-size:.85rem">
            <span class="text-muted">Qty</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:50px" min="1" x-model.number="qty">
            <span class="text-muted">Mkt $</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:80px" step="0.01" x-model.number="market">
            <span class="text-muted">%</span>
            <input type="number" class="form-control form-control-sm text-end"
                   style="width:50px" min="0" max="100" x-model.number="pct">
            <span class="text-muted">→</span>
            <strong class="text-success" x-text="'$'+offered"></strong>
        </div>

    </div>
</div>
{{end}}
